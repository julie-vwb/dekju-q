<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Queue System — PINK JULIE ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #fff0f6 0%, #e6f7ff 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --pink-accent: #ff85c0;
            --pink-soft: #ffdeeb;
            --text-main: #595959;
            --grad-pink: linear-gradient(90deg, #ff9a9e, #fecfef, #ff9a9e);
            --radius-main: 35px; /* ความมนระดับเจ้าหญิง */
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mitr', sans-serif; }
        body { background: var(--bg-grad); background-attachment: fixed; color: var(--text-main); min-height: 100vh; }

        header { padding: 40px 20px; text-align: center; }
        .profile-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; padding: 5px; background: white; box-shadow: 0 8px 20px rgba(255,133,192,0.25); position: relative; overflow: hidden; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #fff; }
        
        .shop-name { font-size: 1.8rem; font-weight: 600; color: var(--pink-accent); text-shadow: 2px 2px 4px rgba(0,0,0,0.02); }
        .shop-sub { font-size: 0.8rem; color: #ff9a9e; margin-top: 8px; opacity: 0.8; }

        .nav-pill { display: inline-flex; background: rgba(255,255,255,0.8); padding: 6px; border-radius: 999px; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-btn { padding: 12px 30px; border-radius: 999px; border: none; cursor: pointer; font-size: 0.95rem; color: #aaa; background: transparent; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-btn.active { background: linear-gradient(45deg, #ff9a9e, #fecfef); color: #fff; box-shadow: 0 6px 15px rgba(255,154,158,0.4); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .search-box { width: 100%; padding: 16px 25px; border-radius: 25px; border: 2px solid #fff; background: #fff; margin-bottom: 30px; outline: none; box-shadow: 0 8px 20px rgba(0,0,0,0.04); font-size: 0.95rem; transition: 0.3s; }
        .search-box:focus { border-color: var(--pink-soft); }

        .q-card { background: var(--card-bg); border-radius: var(--radius-main); padding: 30px; margin-bottom: 25px; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.7); overflow: hidden; }
        .date-stamp { font-size: 0.7rem; color: #d0d0d0; margin-bottom: 8px; display: block; display: flex; align-items: center; gap: 5px; }

        /* แก้ไขตำแหน่งรหัสคิวให้ไม่ทับขอบ */
        .q-no { font-size: 0.75rem; font-weight: 600; color: white; background: var(--grad-pink); padding: 6px 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(255,133,192,0.3); }

        .progress-container { background: #f5f5f5; border-radius: 20px; height: 18px; overflow: hidden; margin: 15px 0; position: relative; border: 1px solid #fff; }
        .progress-bar { 
            height: 100%; width: 0%; background: var(--grad-pink); background-size: 200% 100%; border-radius: 20px; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); 
            animation: progressMoving 2.5s linear infinite; position: relative;
        }
        @keyframes progressMoving { 0% { background-position: 0% 0%; } 100% { background-position: -200% 0%; } }

        .note-box { background: #fff9fb; padding: 15px; border-radius: 20px; font-size: 0.8rem; color: var(--pink-accent); margin-top: 15px; border-left: 5px solid var(--pink-accent); box-shadow: inset 0 2px 5px rgba(255,133,192,0.05); }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .btn-sm { background: var(--pink-soft); color: var(--pink-accent); border: none; padding: 10px 18px; border-radius: 18px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.3s ease; }
        .btn-sm:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(255,133,192,0.15); }
        .btn-copy { background: #e6f7ff; color: #1890ff; }
        .btn-finish { background: linear-gradient(45deg, #ff9a9e, #fecfef); color: white; border: none; padding: 10px 22px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; margin-left: auto; cursor: pointer; }

        /* ป๊อปอัพ Goy Up แบบมนที่สุดในสามโลก */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 192, 203, 0.15); backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center; z-index: 3000;
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 380px; padding: 40px 30px;
            border-radius: 45px; text-align: center; box-shadow: 0 30px 60px rgba(255, 133, 192, 0.25);
            border: 3px solid #fff; animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-title { font-size: 1.2rem; font-weight: 600; color: var(--pink-accent); margin-bottom: 25px; }
        .modal-input { width: 100%; padding: 18px; border-radius: 20px; border: 2px solid #ffdeeb; margin-bottom: 30px; text-align: center; outline: none; font-size: 1rem; transition: 0.3s; }
        .modal-input:focus { border-color: var(--pink-accent); }

        .section-label { font-size: 1rem; color: var(--pink-accent); margin: 35px 0 15px 5px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 30px; border-radius: 30px; font-size: 0.85rem; display: none; z-index: 4000; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>

<header>
    <div class="profile-container">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Julie&backgroundColor=ffdeeb" class="profile-img" alt="Julie Logo">
    </div>
    <div class="shop-name">PINK — JULIE</div>
    <div class="shop-sub">🧚‍♂️ รับทำเว็บไซต์และงานออกแบบสไตล์หวานฉ่ำ ✨</div>
    <div class="nav-pill">
        <button class="nav-btn active" id="tab-pub" onclick="goPage('pub')">คิวงานลูกค้า</button>
        <button class="nav-btn" id="tab-adm" onclick="tryAdmin()">แอดมินร้าน</button>
    </div>
</header>

<div class="container">
    <main id="page-pub" class="page on">
        <input type="text" id="searchQ" class="search-box" placeholder="🔍 ค้นหาคิว หรือ ชื่อลูกค้า...">
        <div class="section-label">💖 กำลังตั้งใจทำอยู่นะคะ</div>
        <div id="list-progress"></div>
        <div class="section-label">⏳ คิวถัดไปเตรียมตัวเลย</div>
        <div id="list-waiting"></div>
        <div class="section-label">🌸 งานสวยๆ เสร็จแล้วจ้า</div>
        <div id="list-done"></div>
    </main>
    <main id="page-adm" class="page" style="display:none;"><div id="admin-content"></div></main>
</div>

<div id="goyUp" class="modal-overlay">
    <div class="modal-content">
        <div id="modalTitle" class="modal-title">🎀 จัดการข้อมูล 🎀</div>
        <input type="text" id="modalInput" class="modal-input" placeholder="พิมพ์ข้อความที่นี่...">
        <div style="display:flex; gap:15px;">
            <button class="btn-sm" style="flex:1; background:#f5f5f5; color:#999; height:55px; border-radius:25px; font-size:1rem;" onclick="closeModal()">ไว้วันหลัง</button>
            <button class="btn-sm" style="flex:1; background:var(--grad-pink); color:white; height:55px; border-radius:25px; font-size:1rem; box-shadow:0 8px 20px rgba(255,154,158,0.4);" id="modalConfirmBtn">ตกลงค่ะ ✨</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">คัดลอกแคปชั่นแล้วค่ะ ✨</div>

<script>
    let db = JSON.parse(localStorage.getItem('pj_final_v9')) || { q: [], nextNo: 1 };
    let authed = false;

    function save() { localStorage.setItem('pj_final_v9', JSON.stringify(db)); render(); }
    function getNow() {
        const d = new Date();
        return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()+543} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function copyCaption(id) {
        const x = db.q.find(i => i.id === id);
        const statusText = x.progress === 100 ? "เสร็จเรียบร้อยพร้อมส่งความสวยค่ะ! 🌸" : (x.progress === 0 ? "รอคิวอีกนิดนะคะคนสวย ⏳" : `กำลังปั่นงานให้อย่างไวเลยค่ะ ${x.progress}% 🪄`);
        const text = `#พร้อมส่ง ✨\n\n🎀 สินค้า: ${x.svc}\n🎨 รหัสคิว: ${x.no}\n👤 ลูกค้า: คุณ ${x.name}\n\n📊 สถานะ: ${x.progress}% - ${statusText}\n📢 โน้ต: ${x.note || '-'}\n\n📅 ลงคิวเมื่อ: ${x.createdAt}\n✨ อัปเดตล่าสุด: ${x.updatedAt}\n\nใครอยากได้งานสวยๆ แบบนี้ทักแชทจองคิวแอดมินได้เลยนะคะ ใจละลายแน่นอน! 💖👑`;
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
        });
    }

    function render() {
        const keyword = document.getElementById('searchQ')?.value.toLowerCase() || "";
        const allQ = db.q.filter(x => x.name.toLowerCase().includes(keyword) || x.no.toLowerCase().includes(keyword));

        const draw = (list, id, isAdm = false) => {
            const container = document.getElementById(id);
            if (!container) return;
            if (list.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px; color:#ffb3d9; font-size:0.9rem; border:3px dashed #ffdeeb; border-radius:30px; background:rgba(255,255,255,0.4);">ไม่มีข้อมูลคิวจ้า ✨</div>`;
                return;
            }
            container.innerHTML = list.map(x => `
                <div class="q-card">
                    <span class="date-stamp">📅 ลงเมื่อ: ${x.createdAt}</span>
                    <div style="display:flex; justify-content:space-between; align-items: center;">
                        <div>
                            <div style="font-weight:600; font-size:1.1rem; color:#444;">คุณ ${x.name}</div>
                            <div style="font-size:0.85rem; color:#999; margin-top:2px;">${x.svc}</div>
                        </div>
                        <div class="q-no">${x.no}</div>
                    </div>

                    <div style="margin-top:18px;">
                        <div class="progress-container"><div class="progress-bar" style="width:${x.progress}%"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:#ff85c0; font-weight:600;">
                            <span>✨ อัปเดต: ${x.updatedAt}</span>
                            <span>${x.progress}%</span>
                        </div>
                    </div>

                    ${x.note ? `<div class="note-box">📢 Note: ${x.note}</div>` : ''}

                    <div class="btn-group">
                        <button class="btn-sm btn-copy" onclick="copyCaption(${x.id})">ก๊อปแคปชั่น 📋</button>
                        ${isAdm ? `
                            ${x.progress === 0 ? `<button class="btn-sm btn-start" style="background:#e6fffb; color:#13c2c2;" onclick="updateQ(${x.id}, 'start')">เริ่มคิวงาน 🪄</button>` : ''}
                            ${x.progress > 0 && x.progress < 100 ? `
                                <button class="btn-sm" onclick="updateQ(${x.id}, 'prog')">+ 10%</button>
                                <button class="btn-sm" onclick="updateQ(${x.id}, 'note')">แก้โน้ต</button>
                                <button class="btn-finish" onclick="updateQ(${x.id}, 'done')">finish ✨</button>
                            ` : ''}
                            ${x.progress === 100 ? `<button class="btn-sm" style="color:#ff4d4d; background:none;" onclick="delQ(${x.id})">ลบคิว</button>` : ''}
                        ` : ''}
                    </div>
                </div>
            `).join('');
        };

        draw(allQ.filter(x => x.progress > 0 && x.progress < 100), 'list-progress');
        draw(allQ.filter(x => x.progress === 0), 'list-waiting');
        draw(allQ.filter(x => x.progress === 100), 'list-done');

        if (authed && document.getElementById('admin-content')) {
            document.getElementById('admin-content').innerHTML = `
                <div class="q-card" style="border: 3px solid var(--pink-soft);">
                    <div class="section-label" style="margin-top:0; font-size:1.1rem;">🎀 เพิ่มลูกค้าใหม่</div>
                    <input type="text" id="in-name" class="search-box" style="margin-bottom:12px; box-shadow:none; border:2px solid #ffdeeb; border-radius:20px;" placeholder="ชื่อลูกค้า">
                    <input type="text" id="in-svc" class="search-box" style="margin-bottom:20px; box-shadow:none; border:2px solid #ffdeeb; border-radius:20px;" placeholder="รายละเอียดงาน">
                    <button class="btn-finish" style="width:100%; padding:18px; font-size:1.1rem; border-radius:20px;" onclick="addNewOrder()">บันทึกคิว ✨</button>
                </div>
                <div id="adm-list"></div>
            `;
            draw(db.q, 'adm-list', true);
        }
    }

    function addNewOrder() {
        const name = document.getElementById('in-name').value;
        const svc = document.getElementById('in-svc').value;
        if (!name) return;
        const now = getNow();
        db.q.push({ id: Date.now(), no: "PJ-" + db.nextNo.toString().padStart(3, '0'), name, svc, progress: 0, note: '', createdAt: now, updatedAt: now });
        db.nextNo++; save();
    }

    function updateQ(id, type) {
        const item = db.q.find(x => x.id === id);
        if (!item) return;
        if (type === 'start') { item.progress = 10; item.updatedAt = getNow(); save(); }
        if (type === 'prog') { item.progress = Math.min(item.progress + 10, 100); item.updatedAt = getNow(); save(); }
        if (type === 'done') { 
            openModal("🌸 ยืนยันจบงาน 🌸", (val) => { item.progress = 100; item.updatedAt = getNow(); save(); });
        }
        if (type === 'note') {
            openModal("🎀 อัปเดตโน้ต 🎀", (val) => { item.note = val; item.updatedAt = getNow(); save(); });
        }
    }

    function openModal(title, callback) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('goyUp').style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => { callback(document.getElementById('modalInput').value); closeModal(); };
    }
    function closeModal() { document.getElementById('goyUp').style.display = 'none'; document.getElementById('modalInput').value = ""; }
    
    function goPage(p) {
        document.querySelectorAll('.page').forEach(x => x.style.display = 'none');
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + p).style.display = 'block';
        document.getElementById('tab-' + p).classList.add('active');
        render();
    }

    function tryAdmin() {
        const p = prompt("รหัสแอดมิน (1234):");
        if (p === '1234') { authed = true; goPage('adm'); }
    }
    function delQ(id) { if(confirm('ลบคิวนี้ใช่ไหมคะ?')) { db.q = db.q.filter(x => x.id !== id); save(); } }

    document.getElementById('searchQ').onkeyup = render;
    render();
</script>
</body>
</html>
