<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Kawaii Order Queue</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr&family=Prompt&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #ffe4f5, #f3e5ff, #e5f4ff);
            background-attachment: fixed;
            min-height: 100vh;
            color: #4a4a4a;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; font-family: 'Mitr', sans-serif; color: #ff85b3; margin: 20px 0; font-size: 2rem; }
        .card { background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 20px; margin: 15px 0; box-shadow: 0 5px 15px rgba(255, 179, 217, 0.2); }
        .tabs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .tab-btn { padding: 10px 20px; border: 2px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-family: 'Mitr'; font-weight: 600; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; border-color: transparent; }
        .tab-btn:hover { transform: translateY(-2px); }
        .hidden { display: none !important; }
        .input-group { margin: 15px 0; }
        label { display: block; font-weight: 600; color: #ff85b3; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 2px solid #ddd; border-radius: 10px; font-family: 'Prompt'; font-size: 16px; outline: none; }
        input:focus, textarea:focus { border-color: #ffb3d9; background: #ffe4f5; }
        .buttons { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
        .btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Mitr'; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 179, 217, 0.4); }
        .btn-danger { background: #ff8fa3; color: white; }
        .btn-small { padding: 6px 10px; font-size: 0.8rem; }
        .pill { padding: 8px 12px; border: 2px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.8rem; margin: 5px; transition: 0.3s; }
        .pill:hover { background: #ffe4f5; }
        .pill.active { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; border-color: transparent; }
        .pill-group { display: flex; flex-wrap: wrap; margin: 10px 0; }
        .progress { width: 100%; height: 15px; background: #f0f0f0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ffb3d9, #d8c5e8); transition: width 0.5s; }
        .order-item { background: #fff; padding: 20px; border-radius: 15px; margin: 15px 0; border-left: 6px solid #ffb3d9; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .order-id { font-family: 'Mitr'; font-weight: 700; color: #ff85b3; font-size: 1.2rem; }
        .status-badge { background: #d8c5e8; color: white; padding: 5px 15px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; }
        .empty { text-align: center; color: #999; padding: 40px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; }
        .modal h2 { color: #ff85b3; margin-bottom: 15px; font-family: 'Mitr'; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #ff85b3, #ffb3d9); color: white; padding: 12px 24px; border-radius: 20px; display: none; z-index: 2000; }
        .toast.show { display: block; animation: slideDown 0.3s; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div id="clientView">
        <div class="container">
            <h1>🎀 PJ Kawaii Queue ✨</h1>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchView('client')">👁️ ตรวจสอบคิว</button>
                <button class="tab-btn" onclick="switchView('login')">🛠️ ระบบจัดการ</button>
            </div>
            <div class="card">
                <h3 style="color: #ff85b3; margin-bottom: 10px;">🔍 ค้นหาออเดอร์</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="searchTerm" placeholder="Order ID หรือ ชื่อลูกค้า" style="flex: 1;">
                    <button class="btn btn-primary" onclick="performSearch()">🔍</button>
                </div>
            </div>
            <div id="searchResults"></div>
            <div class="card">
                <h3 style="color: #ff85b3; margin-bottom: 10px;">📋 รายการคิวทั้งหมด</h3>
                <div id="clientOrdersList"></div>
            </div>
        </div>
    </div>

    <div id="adminView" class="hidden">
        <div class="container">
            <h1>🛠️ Admin Dashboard</h1>
            <div class="tabs">
                <button class="tab-btn" onclick="switchView('client')">👁️ ตรวจสอบคิว</button>
                <button class="tab-btn active" onclick="switchView('admin')">🛠️ ระบบจัดการ</button>
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <button class="btn btn-danger" onclick="performLogout()">ออกจากระบบ</button>
            </div>
            <div class="card">
                <h3 style="color: #ff85b3;">📊 สถิติ</h3>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;">
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center;">
                        <div style="font-size: 1.5rem; color: #ff85b3; font-weight: 700;" id="stat1">0</div>
                        <div style="color: #999; font-size: 0.8rem;">ทั้งหมด</div>
                    </div>
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center;">
                        <div style="font-size: 1.5rem; color: #ff85b3; font-weight: 700;" id="stat2">0</div>
                        <div style="color: #999; font-size: 0.8rem;">กำลังทำ</div>
                    </div>
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 15px; text-align: center;">
                        <div style="font-size: 1.5rem; color: #ff85b3; font-weight: 700;" id="stat3">0</div>
                        <div style="color: #999; font-size: 0.8rem;">เสร็จแล้ว</div>
                    </div>
                </div>
            </div>
            <div class="card">
                <h3 style="color: #ff85b3; margin-bottom: 15px;">➕ เพิ่มออเดอร์</h3>
                <div class="input-group"><label>ชื่อลูกค้า *</label><input type="text" id="formName"></div>
                <div class="input-group"><label>ติดต่อ</label><input type="text" id="formContact"></div>
                <div class="input-group"><label>รายละเอียด *</label><textarea id="formDetail" rows="3"></textarea></div>
                <div class="input-group"><label>บันทึก</label><textarea id="formNote" rows="2"></textarea></div>
                <div class="input-group">
                    <label>ความคืบหน้า: <span id="percentLabel">0</span>%</label>
                    <div class="pill-group" id="progressButtons"></div>
                    <input type="hidden" id="formPercent" value="0">
                    <div class="progress"><div class="progress-bar" id="progressPreview" style="width: 0%;"></div></div>
                </div>
                <div class="input-group">
                    <label>สถานะ</label>
                    <div class="pill-group" id="statusButtons"></div>
                    <input type="hidden" id="formStatus" value="รอเริ่มงาน">
                </div>
                <div class="buttons">
                    <button class="btn btn-primary" onclick="saveOrder()" style="flex: 1;">💾 บันทึก</button>
                    <button class="btn btn-danger" onclick="resetForm()" style="flex: 1;">🔄 รีเซต</button>
                </div>
            </div>
            <h3 style="color: #ff85b3; margin-top: 30px; margin-bottom: 15px;">📋 รายการออเดอร์</h3>
            <div id="adminOrdersList"></div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>🔒 Admin Login</h2>
            <div class="input-group"><input type="password" id="passwordInput" placeholder="รหัสผ่าน"></div>
            <div class="buttons" style="justify-content: center;">
                <button class="btn btn-primary" onclick="performLogin()">เข้าสู่ระบบ</button>
                <button class="btn btn-danger" onclick="closeModal()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        let orders = [];
        let isLoggedIn = false;
        let orderCounter = 1;
        let editingIndex = -1;

        function loadData() {
            const saved = localStorage.getItem('orders');
            orders = saved ? JSON.parse(saved) : [];
            orderCounter = parseInt(localStorage.getItem('counter')) || 1;
        }

        function saveData() {
            localStorage.setItem('orders', JSON.stringify(orders));
            localStorage.setItem('counter', orderCounter);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function switchView(view) {
            if (view === 'login') { document.getElementById('loginModal').classList.add('show'); return; }
            if (view === 'admin' && !isLoggedIn) { document.getElementById('loginModal').classList.add('show'); return; }
            const clientView = document.getElementById('clientView');
            const adminView = document.getElementById('adminView');
            if (view === 'client') { clientView.classList.remove('hidden'); adminView.classList.add('hidden'); }
            else { clientView.classList.add('hidden'); adminView.classList.remove('hidden'); }
            render();
        }

        function closeModal() { document.getElementById('loginModal').classList.remove('show'); }

        function performLogin() {
            if (document.getElementById('passwordInput').value === 'admin123') {
                isLoggedIn = true; closeModal(); switchView('admin'); initializeAdminPanel(); showToast('✨ ยินดีต้อนรับ');
            } else { showToast('❌ รหัสผ่านผิด'); }
        }

        function performLogout() { if (confirm('ออกจากระบบ?')) { isLoggedIn = false; switchView('client'); } }

        function initializeAdminPanel() {
            const prog = document.getElementById('progressButtons'); prog.innerHTML = '';
            for (let i = 0; i <= 100; i += 10) {
                const b = document.createElement('button'); b.className = 'pill'; b.textContent = i+'%';
                b.onclick = () => setProgress(i, b); prog.appendChild(b);
            }
            const stats = ['รอเริ่มงาน', 'กำลังทำ', 'ใกล้เสร็จ', 'เสร็จแล้ว', 'ส่งงานแล้ว'];
            const statC = document.getElementById('statusButtons'); statC.innerHTML = '';
            stats.forEach(s => {
                const b = document.createElement('button'); b.className = 'pill'; b.textContent = s;
                b.onclick = () => setStatus(s, b); statC.appendChild(b);
            });
        }

        function setProgress(v, b) {
            document.getElementById('formPercent').value = v; document.getElementById('percentLabel').textContent = v;
            document.getElementById('progressPreview').style.width = v+'%';
            document.querySelectorAll('#progressButtons .pill').forEach(p => p.classList.remove('active')); b.classList.add('active');
        }

        function setStatus(s, b) {
            document.getElementById('formStatus').value = s;
            document.querySelectorAll('#statusButtons .pill').forEach(p => p.classList.remove('active')); b.classList.add('active');
        }

        function saveOrder() {
            const n = document.getElementById('formName').value;
            const d = document.getElementById('formDetail').value;
            if (!n || !d) { showToast('⚠️ กรอกข้อมูลให้ครบ'); return; }

            if (editingIndex > -1) {
                orders[editingIndex] = { ...orders[editingIndex], 
                    name: n, contact: document.getElementById('formContact').value,
                    detail: d, note: document.getElementById('formNote').value,
                    status: document.getElementById('formStatus').value,
                    percent: document.getElementById('formPercent').value
                };
                editingIndex = -1;
            } else {
                orders.push({
                    id: 'PJ-' + String(orderCounter).padStart(3, '0'),
                    name: n, contact: document.getElementById('formContact').value,
                    detail: d, note: document.getElementById('formNote').value,
                    status: document.getElementById('formStatus').value,
                    percent: document.getElementById('formPercent').value,
                    date: new Date().toLocaleDateString('th-TH')
                });
                orderCounter++;
            }
            saveData(); resetForm(); render(); showToast('✨ บันทึกแล้ว');
        }

        function editOrder(i) {
            const o = orders[i]; editingIndex = i;
            document.getElementById('formName').value = o.name;
            document.getElementById('formDetail').value = o.detail;
            document.getElementById('formContact').value = o.contact;
            document.getElementById('formNote').value = o.note;
            window.scrollTo(0,0);
        }

        function deleteOrder(i) { if (confirm('ลบ?')) { orders.splice(i,1); saveData(); render(); } }

        function render() {
            document.getElementById('stat1').textContent = orders.length;
            document.getElementById('stat2').textContent = orders.filter(o => o.status === 'กำลังทำ').length;
            document.getElementById('stat3').textContent = orders.filter(o => o.status === 'เสร็จแล้ว').length;

            const list = document.getElementById('clientOrdersList');
            list.innerHTML = orders.length ? orders.map(o => `
                <div class="order-item">
                    <div class="order-header"><span class="order-id">${o.id}</span><span class="status-badge">${o.status}</span></div>
                    <p><strong>👤 ชื่อ:</strong> ${o.name}</p>
                    <p><strong>📋 รายละเอียด:</strong> ${o.detail}</p>
                    <div class="progress"><div class="progress-bar" style="width: ${o.percent}%"></div></div>
                </div>`).join('') : '<div class="empty">ไม่มีคิว</div>';

            const adminList = document.getElementById('adminOrdersList');
            adminList.innerHTML = orders.map((o, i) => `
                <div class="order-item">
                    <div class="order-header"><strong>${o.id}</strong></div>
                    <p>👤 ${o.name} | 📋 ${o.detail}</p>
                    <div class="buttons">
                        <button class="btn btn-primary btn-small" onclick="editOrder(${i})">แก้</button>
                        <button class="btn btn-danger btn-small" onclick="deleteOrder(${i})">ลบ</button>
                    </div>
                </div>`).join('');
        }

        function resetForm() {
            document.getElementById('formName').value = ''; document.getElementById('formDetail').value = '';
            document.getElementById('formContact').value = ''; document.getElementById('formNote').value = '';
        }

        window.onload = () => { loadData(); render(); };
    </script>
</body>
</html>
