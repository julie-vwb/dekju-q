<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PINK JULIE — Queue System</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-main: #0a0e14; 
            --card-bg: rgba(22, 27, 34, 0.95); 
            --neon-green: #2dfc52; 
            --neon-glow: rgba(45, 252, 82, 0.4);
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
            --primary-grad: linear-gradient(135deg, #2dfc52 0%, #24cc44 100%);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mitr', sans-serif; }
        
        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            min-height: 100vh; 
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, #1a2c1e, transparent);
        }

        /* 🌸 Floating Emojis Background */
        .bg-emojis {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .emoji {
            position: absolute; font-size: 24px; opacity: 0.15;
            animation: float 15s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.15; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Header & Profile */
        header { 
            background: rgba(10, 14, 20, 0.8); padding: 30px 20px; text-align: center;
            border-bottom: 2px solid var(--neon-green); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 100;
        }
        .profile-img {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 20px var(--neon-glow);
            margin-bottom: 15px; object-fit: cover;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--neon-glow); }
            50% { box-shadow: 0 0 25px var(--neon-green); }
            100% { box-shadow: 0 0 10px var(--neon-glow); }
        }
        .shop-name {
            font-size: 1.8rem; font-weight: 600; color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-glow); letter-spacing: 2px;
        }
        
        .nav-pill { display: inline-flex; background: #000; padding: 5px; border-radius: 999px; margin-top: 15px; border: 1px solid #333; }
        .nav-btn { padding: 8px 25px; border-radius: 999px; border: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; background: transparent; color: var(--text-sub); }
        .nav-btn.active { background: var(--primary-grad); color: #000; font-weight: 600; box-shadow: 0 0 15px var(--neon-green); }

        .container { max-width: 480px; margin: 0 auto; padding: 20px; position: relative; }

        /* Search & Cards */
        .search-container { position: relative; margin-bottom: 25px; }
        .search-input {
            width: 100%; padding: 16px 20px 16px 50px; border-radius: 20px;
            border: 1px solid #333; background: var(--card-bg); color: white; outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .search-input:focus { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-glow); }

        .q-card {
            background: var(--card-bg); border-radius: 22px; padding: 20px; margin-bottom: 18px;
            border: 1px solid rgba(45, 252, 82, 0.1); position: relative;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .q-card:hover { transform: translateY(-5px); border-color: var(--neon-green); }
        
        .progress-container { background: #000; border-radius: 10px; height: 12px; margin: 12px 0; border: 1px solid #222; overflow: hidden; }
        .progress-bar { 
            background: var(--primary-grad); height: 100%; width: 0%; 
            transition: 1s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 0 10px var(--neon-green);
        }
        
        .status-badge { font-size: 0.7rem; padding: 4px 12px; border-radius: 8px; font-weight: 600; }
        .st-doing { background: var(--neon-green); color: #000; box-shadow: 0 0 10px var(--neon-glow); }

        /* Modal & Admin UI */
        .modal-content {
            background: #161b22; border: 2px solid var(--neon-green);
            border-radius: 30px; box-shadow: 0 0 40px var(--neon-glow);
        }
        .admin-box { 
            background: rgba(45, 252, 82, 0.03); border: 1px dashed var(--neon-green);
            border-radius: 25px; padding: 20px; margin-bottom: 25px;
        }
        .admin-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; margin-bottom: 10px; }
        .btn-add { background: var(--primary-grad); color: #000; padding: 15px; border-radius: 15px; font-weight: 600; border: none; width: 100%; cursor: pointer; }

        .section-label { font-size: 0.9rem; color: var(--neon-green); margin: 30px 0 15px 5px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .toast { background: var(--neon-green); color: #000; font-weight: 600; padding: 12px 30px; border-radius: 50px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; z-index: 9999; }

        /* Animation */
        .page { display: none; }
        .page.on { display: block; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="bg-emojis" id="emojiBG"></div>

<header>
    <img src="https://via.placeholder.com/150/2dfc52/000000?text=PINK" alt="Logo" class="profile-img">
    <div class="shop-name">PINK — JULIE</div>
    <div style="font-size: 0.75rem; color: var(--text-sub); margin-top: 5px;">🧚‍♂️ Web Design & Digital Art 🟢</div>
    
    <div class="nav-pill">
        <button class="nav-btn active" id="tab-pub" onclick="goPage('pub')">CHECK QUEUE</button>
        <button class="nav-btn" id="tab-adm" onclick="tryAdmin()">ADMIN</button>
    </div>
</header>

<div class="container">
    <main id="page-pub" class="page on">
        <div class="search-container">
            <span style="position:absolute; left:20px; top:16px; color: var(--neon-green);">🔍</span>
            <input type="text" class="search-input" id="searchQ" placeholder="Search by Name / Order ID..." onkeyup="render()">
        </div>
        
        <div id="queue-summary" style="margin-bottom: 25px; font-size: 0.8rem; color: var(--text-sub); display: flex; justify-content: space-between; padding: 0 5px;"></div>

        <div class="section-label">🧚‍♂️ Working Now</div>
        <div id="list-progress"></div>
        <div class="section-label">⌛ Next List</div>
        <div id="list-waiting"></div>
        <div class="section-label">⭐ Success</div>
        <div id="list-done"></div>

        <div style="display:flex; gap:10px; margin-top:40px;">
            <a href="#" class="btn-add" style="text-align:center; text-decoration:none; background:transparent; border:1px solid var(--neon-green); color:var(--neon-green); font-size:0.8rem;">CONTACT LINE</a>
            <a href="#" class="btn-add" style="text-align:center; text-decoration:none; font-size:0.8rem;">FACEBOOK</a>
        </div>
    </main>

    <main id="page-adm" class="page">
        <div id="admin-content"></div>
    </main>
</div>

<div id="customModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); display:none; align-items:center; justify-content:center; z-index:9999;">
    <div class="modal-content" style="width:90%; max-width:320px; padding:30px; text-align:center;">
        <div id="modalTitle" style="color:var(--neon-green); font-weight:600; margin-bottom:20px;">TITLE</div>
        <input type="text" id="modalInput" class="admin-input" style="text-align:center;">
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal()" style="flex:1; padding:12px; background:#222; border:none; color:#888; border-radius:12px; cursor:pointer;">CLOSE</button>
            <button id="modalConfirmBtn" style="flex:1; padding:12px; background:var(--primary-grad); border:none; color:#000; border-radius:12px; font-weight:600; cursor:pointer;">OK</button>
        </div>
    </div>
</div>

<div id="toast" class="toast">SUCCESS! 🟢</div>

<script>
    let db = JSON.parse(localStorage.getItem('pj_cyber_v2')) || { q: [], nextNo: 1 };
    let authed = false;

    // 🌸 สร้างระบบอิโมจิลอยพื้นหลัง
    const emojis = ['🧚‍♂️', '🟢', '✨', '⭐', '💚', '💫', '🪄'];
    function createEmoji() {
        const bg = document.getElementById('emojiBG');
        const e = document.createElement('div');
        e.className = 'emoji';
        e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        e.style.left = Math.random() * 100 + 'vw';
        e.style.animationDuration = (Math.random() * 10 + 5) + 's';
        bg.appendChild(e);
        setTimeout(() => e.remove(), 15000);
    }
    setInterval(createEmoji, 1500)

    function save() { 
        localStorage.setItem('pj_cyber_v2', JSON.stringify(db)); 
        render(); 
    }

    function render() {
        const keyword = document.getElementById('searchQ').value.toLowerCase();
        const allQ = db.q;
        const filtered = allQ.filter(x => 
            x.name.toLowerCase().includes(keyword) || 
            x.no.toLowerCase().includes(keyword)
        );

        const summary = document.getElementById('queue-summary');
        if(summary) summary.innerHTML = `<span>SERVER: <b style="color:var(--neon-green)">STABLE</b></span><span>TOTAL: <b>${allQ.length} ORDERS</b></span>`;

        const draw = (list, id, isAdm = false) => {
            const container = document.getElementById(id);
            if(!container) return;
            container.innerHTML = list.map(x => `
                <div class="q-card">
                    <div style="display:flex; align-items:center; gap:12px; margin-bottom:15px;">
                        <div style="width:55px; height:45px; border-radius:10px; border:1.5px solid var(--neon-green); color:var(--neon-green); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:0.8rem; background:rgba(45,252,82,0.05);">${x.no}</div>
                        <div style="flex:1">
                            <div style="font-weight:600; font-size:0.95rem;">${x.name} <span class="status-badge st-doing" style="font-size:0.6rem; vertical-align:middle; margin-left:5px;">${x.status}</span></div>
                            <div style="font-size:0.75rem; color:var(--text-sub);">${x.svc} | ${x.price}฿</div>
                        </div>
                    </div>
                    <div class="progress-container"><div class="progress-bar" style="width:${x.progress}%"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; color:var(--text-sub); margin-bottom:10px;">
                        <span>Progress Update</span><span>${x.progress}%</span>
                    </div>
                    ${x.updateMsg ? `<div style="background:rgba(255,255,255,0.03); padding:10px; border-radius:10px; font-size:0.75rem; border-left:3px solid var(--neon-green);">📢 ${x.updateMsg}</div>` : ''}
                    
                    ${isAdm ? `
                        <div style="margin-top:15px; display:flex; gap:5px; flex-wrap:wrap;">
                            <input type="number" value="${x.progress}" onchange="updateQ(${x.id},'progress',this.value)" style="width:45px; background:#000; color:var(--neon-green); border:1px solid #333; border-radius:5px; text-align:center; font-size:0.7rem;">
                            <button onclick="promptUpdate(${x.id})" style="background:#222; border:1px solid var(--neon-green); color:var(--neon-green); padding:5px 10px; border-radius:8px; font-size:0.65rem; cursor:pointer;">Update Msg</button>
                            <button onclick="copyLink('${x.id}')" style="background:var(--neon-green); color:#000; border:none; padding:5px 10px; border-radius:8px; font-size:0.65rem; font-weight:600; cursor:pointer;">Copy Text</button>
                            <button onclick="delQ(${x.id})" style="color:#ff4d4d; background:none; border:none; font-size:0.65rem; padding:5px; cursor:pointer;">Delete</button>
                        </div>
                    ` : ''}
                </div>
            `).join('') || '<div style="text-align:center; color:#333; padding:20px; font-size:0.8rem;">--- EMPTY DATABASE ---</div>';
        };

        draw(filtered.filter(x => x.status === 'inprogress'), 'list-progress');
        draw(filtered.filter(x => x.status === 'waiting'), 'list-waiting');
        draw(filtered.filter(x => x.status === 'done'), 'list-done');
        
        if(authed && document.getElementById('admin-content')) {
            document.getElementById('admin-content').innerHTML = `
                <div class="admin-box">
                    <h4 style="color:var(--neon-green); margin-bottom:15px; font-size:0.9rem;">[+] NEW ENTRY</h4>
                    <input type="text" id="in-name" class="admin-input" placeholder="Customer Name">
                    <input type="text" id="in-svc" class="admin-input" placeholder="Service Detail">
                    <input type="number" id="in-price" class="admin-input" placeholder="Price">
                    <button class="btn-add" onclick="addNewOrder()">SAVE ORDER 🪄</button>
                </div>
                <div id="adm-list"></div>
                <button onclick="logout()" style="width:100%; background:none; border:none; color:#444; margin:20px 0; cursor:pointer;">LOGOUT ACCESS</button>
            `;
            draw(db.q, 'adm-list', true);
        }
    }

    function addNewOrder() {
        const name = document.getElementById('in-name').value;
        const svc = document.getElementById('in-svc').value;
        const price = document.getElementById('in-price').value;
        if(!name) return;
        db.q.push({
            id: Date.now(),
            no: "PJ-" + db.nextNo.toString().padStart(3, '0'),
            name, svc, price, status: 'waiting', progress: 0, updateMsg: ''
        });
        db.nextNo++; save();
    }

    function updateQ(id,f,v) { const item = db.q.find(x=>x.id===id); if(item){item[f]=v; if(f==='progress'&&v==100)item.status='done'; if(f==='progress'&&v>0&&v<100)item.status='inprogress'; save();}}

    function promptUpdate(id) {
        openModal("UPDATE LOG MESSAGE", "What's the news?", (val) => {
            if(val) updateQ(id, 'updateMsg', val);
        });
    }

    function copyLink(id) {
        const q = db.q.find(x=>x.id==id);
        const text = `🧚‍♂️ #PINK_JULIE_UPDATE\nคิวงานคุณ: ${q.name}\nรหัส: ${q.no}\nสถานะ: ${q.progress}%\nเช็คที่นี่: ${window.location.href}`;
        navigator.clipboard.writeText(text).then(() => showToast("COPIED! ✨"));
    }

    function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none',2500); }

    function openModal(t,p,c) {
        const m = document.getElementById('customModal');
        document.getElementById('modalTitle').innerText = t;
        const i = document.getElementById('modalInput');
        i.placeholder = p; i.value = ""; m.style.display = 'flex';
        document.getElementById('modalConfirmBtn').onclick = () => { c(i.value); m.style.display = 'none'; }
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    function goPage(p) {
        document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
        document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('on');
        document.getElementById('tab-'+p).classList.add('active');
        render();
    }

    function tryAdmin() {
        if(authed) return goPage('adm');
        openModal("ADMIN ACCESS", "PASSWORD", (v) => { if(v==='1234'){authed=true; goPage('adm');} });
    }
    function logout() { authed=false; goPage('pub'); }
    function delQ(id) { if(confirm('Delete?')){db.q=db.q.filter(x=>x.id!==id); save();}}

    render();
</script>
</body>
</html>
