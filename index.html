<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Queue Pro — Soft & Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --primary: #8e8ffa; --secondary: #c299ff; --accent: #ff99c8;
            --bg-grad: linear-gradient(135deg, #f5f7ff 0%, #fff0f5 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2d3436; --text-sub: #636e72;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mitr', sans-serif; }
        body { background: var(--bg-grad); min-height: 100vh; color: var(--text-main); }
        
        /* Glass Header */
        header { 
            position: sticky; top: 0; z-index: 100; padding: 15px 20px;
            background: rgba(255,255,255,0.4); backdrop-filter: blur(10px);
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-pill { 
            background: #eee; padding: 4px; border-radius: 999px; display: flex; gap: 5px; 
        }
        .nav-btn { 
            padding: 8px 18px; border-radius: 999px; border: none; cursor: pointer;
            font-size: 0.85rem; transition: 0.3s; background: transparent; color: var(--text-sub);
        }
        .nav-btn.active { background: #fff; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* Card Style */
        .glass-card {
            background: var(--card-bg); backdrop-filter: blur(15px);
            border-radius: 28px; border: 1px solid rgba(255,255,255,0.6);
            padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(142,143,250,0.1);
        }

        /* Status & Hero */
        .hero-title { font-size: 1.4rem; font-weight: 500; margin-bottom: 5px; }
        .status-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 999px;
            background: linear-gradient(90deg, #ff99c8, #ffccf9);
            color: white; font-size: 0.8rem; margin-top: 10px;
        }

        /* Queue List Item */
        .q-item {
            background: #fff; border-radius: 20px; padding: 18px;
            display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
            transition: transform 0.2s; border: 1px solid #f0f0f0;
        }
        .q-num {
            width: 50px; height: 50px; border-radius: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff; display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 1.1rem;
        }
        .q-info { flex: 1; }
        .q-info h4 { font-size: 1rem; color: var(--text-main); }
        .q-info p { font-size: 0.8rem; color: var(--text-sub); }

        /* Form Controls */
        input, select {
            width: 100%; padding: 12px 18px; border-radius: 15px;
            border: 1px solid #eee; background: #f9f9f9; margin-top: 8px; outline: none;
        }
        .btn-main {
            width: 100%; padding: 14px; border-radius: 18px; border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: #fff; font-size: 1rem; font-weight: 500; cursor: pointer;
            margin-top: 15px; box-shadow: 0 8px 20px rgba(142,143,250,0.3);
        }

        .section-label { font-size: 0.85rem; color: var(--text-sub); margin: 25px 0 15px 10px; font-weight: 500; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div style="font-size: 1.5rem;">🌊</div>
        <strong id="shop-name">Your Shop</strong>
    </div>
    <div class="nav-pill">
        <button class="nav-btn active" id="tab-pub" onclick="switchPage('pub')">คิว</button>
        <button class="nav-btn" id="tab-adm" onclick="openAdmin()">จัดการ</button>
    </div>
</header>

<div class="container">
    <main id="page-pub" class="page active">
        <div class="glass-card" style="text-align: center;">
            <div class="hero-title">ยินดีต้อนรับค่ะ ✨</div>
            <p style="font-size: 0.85rem; color: var(--text-sub);">พร้อมรับออเดอร์ให้คุณคนพิเศษ</p>
            <div class="status-badge">Ready for orders 🎀</div>
        </div>

        <div class="section-label">กำลังดำเนินการ</div>
        <div id="list-progress"></div>

        <div class="section-label">รอคิวต่อไป</div>
        <div id="list-waiting"></div>

        <div class="section-label">เสร็จเรียบร้อย (วันนี้)</div>
        <div id="list-done"></div>
    </main>

    <main id="page-adm" class="page">
        <div class="glass-card">
            <h3 style="margin-bottom: 15px;">⚙️ เพิ่มคิวใหม่</h3>
            <div style="margin-bottom: 10px;">
                <label style="font-size: 0.75rem;">ชื่อลูกค้า</label>
                <input type="text" id="in-name" placeholder="ระบุชื่อ...">
            </div>
            <div>
                <label style="font-size: 0.75rem;">บริการ</label>
                <select id="in-svc">
                    <option>ออกแบบ Landing Page</option>
                    <option>รับลงสี (Coloring)</option>
                    <option>รับทำป้าย (Banner)</option>
                </select>
            </div>
            <button class="btn-main" onclick="addQueue()">เพิ่มคิวใหม่ ✨</button>
        </div>

        <div class="section-label">จัดการรายการทั้งหมด</div>
        <div id="adm-list"></div>
        <button onclick="logout()" style="width:100%; background:none; border:none; color:#ff7675; cursor:pointer; margin-top:20px;">🔒 ออกจากระบบแอดมิน</button>
    </main>
</div>

<div id="modal-pw" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); backdrop-filter:blur(5px); z-index:1000; align-items:center; justify-content:center;">
    <div class="glass-card" style="width:300px; text-align:center; background:#fff;">
        <h4>Admin Access</h4>
        <input type="password" id="pw-input" style="text-align:center; margin:15px 0;">
        <button class="btn-main" onclick="checkPw()">เข้าสู่ระบบ</button>
    </div>
</div>
<script>
    let db = JSON.parse(localStorage.getItem('myQ')) || { q: [], nextId: 1 };
    let isAuthed = false;

    function save() { localStorage.setItem('myQ', JSON.stringify(db)); render(); }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('tab-' + p).classList.add('active');
        render();
    }

    function openAdmin() {
        if(isAuthed) switchPage('adm');
        else document.getElementById('modal-pw').style.display = 'flex';
    }

    function checkPw() {
        if(document.getElementById('pw-input').value === '1234') {
            isAuthed = true;
            document.getElementById('modal-pw').style.display = 'none';
            switchPage('adm');
        } else alert('รหัสผ่านไม่ถูกต้อง');
    }

    function logout() { isAuthed = false; switchPage('pub'); }

    function addQueue() {
        const name = document.getElementById('in-name').value;
        const svc = document.getElementById('in-svc').value;
        if(!name) return;
        
        db.q.push({
            id: Date.now(),
            num: '#' + db.nextId++,
            name: name,
            svc: svc,
            status: 'waiting'
        });
        document.getElementById('in-name').value = '';
        save();
    }

    function updateStatus(id, st) {
        const item = db.q.find(x => x.id === id);
        if(item) item.status = st;
        save();
    }

    function removeQ(id) {
        if(confirm('ลบคิวนี้?')) {
            db.q = db.q.filter(x => x.id !== id);
            save();
        }
    }

    function render() {
        const draw = (list, containerId, isAdm = false) => {
            const container = document.getElementById(containerId);
            container.innerHTML = list.map(item => `
                <div class="q-item">
                    <div class="q-num">${item.num}</div>
                    <div class="q-info">
                        <h4>${item.name}</h4>
                        <p>${item.svc}</p>
                    </div>
                    ${isAdm ? `
                        <div style="display:flex; gap:5px;">
                            <button onclick="updateStatus(${item.id}, 'inprogress')" style="padding:5px 10px; border-radius:8px; border:none; background:#e1f5fe; color:#03a9f4; font-size:0.6rem;">เริ่ม</button>
                            <button onclick="updateStatus(${item.id}, 'done')" style="padding:5px 10px; border-radius:8px; border:none; background:#e8f5e9; color:#4caf50; font-size:0.6rem;">เสร็จ</button>
                            <button onclick="removeQ(${item.id})" style="padding:5px 10px; border-radius:8px; border:none; background:#ffebee; color:#f44336; font-size:0.6rem;">ลบ</button>
                        </div>
                    ` : ''}
                </div>
            `).join('') || '<p style="text-align:center; font-size:0.75rem; color:#ccc;">ไม่มีคิวในขณะนี้</p>';
        };

        draw(db.q.filter(x => x.status === 'inprogress'), 'list-progress');
        draw(db.q.filter(x => x.status === 'waiting'), 'list-waiting');
        draw(db.q.filter(x => x.status === 'done'), 'list-done');
        draw(db.q, 'adm-list', true);
    }

    render();
</script>
</body>
</html>
