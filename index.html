<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Queue App — Modern Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a29bfe; --secondary: #fab1a0; --dark: #2d3436;
            --bg: #f5f6fa; --card-bg: #ffffff; --gradient: linear-gradient(135deg, #a29bfe, #6c5ce7);
            --font: 'Mitr', sans-serif;
        }

        body {
            font-family: var(--font); background: var(--bg); color: var(--dark);
            margin: 0; padding-bottom: 80px; overflow-x: hidden;
        }

        /* --- Header --- */
        .header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: #dfe6e9; border: 2px solid white; }
        .greeting { font-size: 0.9rem; color: #636e72; }

        /* --- Dashboard Cards --- */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .dash-card { border-radius: 20px; padding: 20px; color: white; position: relative; overflow: hidden; height: 120px; }
        .card-note { background: #b2bec3 linear-gradient(135deg, #a29bfe, #8e44ad); }
        .card-task { background: #fab1a0 linear-gradient(135deg, #ff9f43, #ee5253); }
        .dash-card h3 { margin: 0; font-size: 1.1rem; position: relative; z-index: 2; }
        .dash-card span { font-size: 0.75rem; opacity: 0.9; position: relative; z-index: 2; }

        /* --- Progress Section --- */
        .section-card { background: var(--card-bg); margin: 0 20px 20px; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .prog-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .prog-bar-outer { background: #f1f2f6; height: 12px; border-radius: 6px; overflow: hidden; }
        .prog-bar-inner { background: linear-gradient(90deg, #fd79a8, #fab1a0); height: 100%; transition: 0.5s; width: 0%; }

        /* --- Search --- */
        .search-container { padding: 0 20px 15px; }
        .search-box { background: white; padding: 12px 20px; border-radius: 15px; display: flex; align-items: center; border: 1px solid #eee; }
        .search-box input { border: none; outline: none; width: 100%; font-family: var(--font); margin-left: 10px; }

        /* --- Queue Item --- */
        .task-list { padding: 0 20px; }
        .task-item { background: white; margin-bottom: 12px; padding: 15px; border-radius: 18px; display: flex; align-items: center; gap: 15px; border-left: 6px solid var(--primary); }
        .task-item.done { border-left-color: #55efc4; opacity: 0.8; }
        .task-num { font-weight: 700; font-size: 1.2rem; color: var(--primary); min-width: 40px; }
        .task-info h4 { margin: 0; font-size: 0.95rem; }
        .task-info p { margin: 2px 0 0; font-size: 0.75rem; color: #b2bec3; }

        /* --- Admin UI --- */
        .admin-auth { text-align: center; padding: 50px 20px; }
        .admin-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; text-align: center; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 12px; width: 100%; font-family: var(--font); cursor: pointer; }

        /* --- Bottom Nav --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #2d3436; height: 75px; display: flex; justify-content: space-around; align-items: center; border-radius: 30px 30px 0 0; z-index: 1000; }
        .nav-item { color: #636e72; font-size: 1.2rem; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: white; }
        .nav-add { background: linear-gradient(135deg, #a29bfe, #6c5ce7); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; margin-top: -40px; border: 5px solid var(--bg); box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app-public">
        <header class="header">
            <div class="user-profile">
                <div class="avatar"></div>
                <div>
                    <span class="greeting">สวัสดีตอนเช้า 👋</span>
                    <div style="font-weight: 600;">ลูกค้าผู้น่ารัก</div>
                </div>
            </div>
            <div style="font-size: 1.4rem;">🔔</div>
        </header>

        <div class="search-container">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" placeholder="ค้นหาเลขคิวหรือชื่อ..." id="searchInp" oninput="renderPublic()">
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="dash-card card-note">
                <span>Create</span>
                <h3>New Note</h3>
            </div>
            <div class="dash-card card-task">
                <span>Create</span>
                <h3>New Task</h3>
            </div>
        </div>

        <div class="section-card">
            <div class="prog-header">
                <span style="font-weight:600; font-size: 0.9rem;">ความคืบหน้าภาพรวม</span>
                <span id="prog-val" style="color: var(--primary); font-weight:600;">0%</span>
            </div>
            <div class="prog-bar-outer">
                <div class="prog-bar-inner" id="prog-bar"></div>
            </div>
        </div>

        <div class="task-list" id="q-list-pub">
            </div>
    </div>

    <div id="app-admin" class="hidden">
        <div id="admin-login" class="admin-auth">
            <h2>ระบบจัดการหลังบ้าน ⚙️</h2>
            <input type="password" id="pass" class="admin-input" placeholder="ใส่รหัสผ่านแอดมิน">
            <button class="btn-action" onclick="checkAuth()">เข้าสู่ระบบ</button>
        </div>

        <div id="admin-panel" class="hidden" style="padding: 20px;">
            <div class="section-card">
                <h3>เพิ่มคิวลูกค้า ✨</h3>
                <input type="text" id="custName" class="admin-input" placeholder="ชื่อลูกค้า">
                <input type="text" id="custSvc" class="admin-input" placeholder="บริการ (เช่น ออกแบบโลโก้)">
                <button class="btn-action" onclick="addQ()">ยืนยันเพิ่มคิว</button>
            </div>
            <div id="q-list-adm"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active" onclick="showSection('pub')">🏠</a>
        <a href="#" class="nav-item">📋</a>
        <div class="nav-add" onclick="showSection('adm')">+</div>
        <a href="#" class="nav-item">📁</a>
        <a href="#" class="nav-item" onclick="logout()">🔒</a>
    </nav>

    <script>
        let queues = JSON.parse(localStorage.getItem('myQueues')) || [];
        const ADMIN_PASS = "1234"; // รหัสผ่านแอดมิน

        function save() { 
            localStorage.setItem('myQueues', JSON.stringify(queues));
            renderPublic();
            renderAdmin();
        }

        function renderPublic() {
            const list = document.getElementById('q-list-pub');
            const search = document.getElementById('searchInp').value.toLowerCase();
            const filtered = queues.filter(q => q.name.toLowerCase().includes(search) || q.id.toString().includes(search));
            
            // คำนวณความคืบหน้า
            const totalProg = queues.length ? (queues.reduce((s, q) => s + q.prog, 0) / queues.length).toFixed(0) : 0;
            document.getElementById('prog-bar').style.width = totalProg + '%';
            document.getElementById('prog-val').innerText = totalProg + '% Done';

            list.innerHTML = filtered.map(q => `
                <div class="task-item ${q.prog == 100 ? 'done' : ''}">
                    <div class="task-num">#${q.id}</div>
                    <div class="task-info">
                        <h4>คุณ${q.name}</h4>
                        <p>${q.svc} | ⏳ ${q.prog}%</p>
                    </div>
                </div>
            `).join('');
        }

        function renderAdmin() {
            const list = document.getElementById('q-list-adm');
            list.innerHTML = queues.map(q => `
                <div class="section-card" style="margin: 10px 0;">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>#${q.id} ${q.name}</strong>
                        <button onclick="deleteQ(${q.id})" style="color:red; border:none; background:none;">ลบ</button>
                    </div>
                    <input type="range" min="0" max="100" step="10" value="${q.prog}" 
                           style="width:100%; margin:10px 0;" onchange="updateProg(${q.id}, this.value)">
                    <div style="font-size:0.8rem; text-align:right;">ความคืบหน้า: ${q.prog}%</div>
                </div>
            `).join('');
        }

        function addQ() {
            const name = document.getElementById('custName').value;
            const svc = document.getElementById('custSvc').value;
            if(!name || !svc) return alert('ใส่ข้อมูลให้ครบก่อนนะค้าา 🎀');
            queues.push({ id: queues.length + 1, name, svc, prog: 0 });
            document.getElementById('custName').value = '';
            document.getElementById('custSvc').value = '';
            save();
        }

        function updateProg(id, val) {
            const q = queues.find(x => x.id === id);
            if(q) q.prog = parseInt(val);
            save();
        }

        function deleteQ(id) {
            if(confirm('ลบคิวนี้แน่ใจนะคะ?')) {
                queues = queues.filter(x => x.id !== id);
                save();
            }
        }

        function checkAuth() {
            if(document.getElementById('pass').value === ADMIN_PASS) {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                renderAdmin();
            } else {
                alert('รหัสผ่านไม่ถูกต้องนะคะ ❌');
            }
        }

        function showSection(type) {
            if(type === 'pub') {
                document.getElementById('app-public').classList.remove('hidden');
                document.getElementById('app-admin').classList.add('hidden');
            } else {
                document.getElementById('app-public').classList.add('hidden');
                document.getElementById('app-admin').classList.remove('hidden');
            }
        }

        function logout() {
            document.getElementById('pass').value = '';
            document.getElementById('admin-login').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            showSection('pub');
        }

        renderPublic();
    </script>
</body>
</html>
