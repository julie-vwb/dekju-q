<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Blue Queue ✨ Client Notify</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e8f6fd; --sky: #dff1fb; --blue: #5ab4e5; --blue2: #3a9dd4;
            --text: #1e4d6b; --card: #ffffff; --font: 'Mitr', sans-serif;
            --green: #2ecc71;
        }

        body { font-family: var(--font); background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
        .topbar { background: linear-gradient(135deg, var(--blue2), var(--blue)); padding: 25px; text-align: center; color: white; border-radius: 0 0 30px 30px; }
        
        .search-wrap { padding: 15px 20px; }
        .search-input { width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--sky); outline: none; font-family: var(--font); box-sizing: border-box; }

        .card { background: var(--card); margin: 15px; padding: 20px; border-radius: 25px; border: 1.5px solid var(--sky); box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        
        /* Progress & Badges */
        .prog-outer { background: #eee; height: 10px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .prog-inner { background: linear-gradient(90deg, var(--blue), #55efc4); height: 100%; transition: 0.5s; }
        .status-badge { font-size: 0.7rem; padding: 3px 10px; border-radius: 10px; background: var(--sky); color: var(--blue2); font-weight: 500; }

        /* Admin UI */
        .admin-input { width: 100%; padding: 10px; border-radius: 12px; border: 1.5px solid var(--sky); margin-bottom: 10px; font-family: var(--font); box-sizing: border-box; }
        .btn-main { background: var(--blue); color: white; border: none; padding: 12px; border-radius: 15px; width: 100%; cursor: pointer; font-family: var(--font); font-weight: 500; }
        .btn-line { background: var(--green); color: white; border: none; padding: 8px 15px; border-radius: 10px; font-family: var(--font); font-size: 0.8rem; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; text-decoration: none; }

        /* Bottom Nav */
        .nav-bottom { position: fixed; bottom: 15px; left: 15px; right: 15px; background: white; height: 65px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid var(--sky); z-index: 1000; }
        .nav-btn { font-size: 1.4rem; cursor: pointer; opacity: 0.4; }
        .nav-btn.active { opacity: 1; color: var(--blue2); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="page-pub">
        <header class="topbar">
            <div style="font-size: 1.3rem; font-weight: 600;">Queue Status 🎀</div>
            <div style="font-size: 0.8rem; opacity: 0.9;">ค้นหาหมายเลขคิวเพื่อเช็คสถานะปัจจุบันนะคะ</div>
        </header>

        <div class="search-wrap">
            <input type="text" class="search-input" id="searchQ" placeholder="🔍 ใส่หมายเลขคิวของคุณ..." oninput="renderPub()">
        </div>

        <div id="q-list-pub"></div>
    </div>

    <div id="page-adm" class="hidden">
        <div id="adm-login" style="padding: 50px 20px;">
            <div class="card" style="text-align: center;">
                <h3>Admin Access 🔒</h3>
                <input type="password" id="pw" class="admin-input" placeholder="ใส่รหัสผ่าน">
                <button class="btn-main" onclick="checkLogin()">Login</button>
            </div>
        </div>

        <div id="adm-content" class="hidden" style="padding: 20px;">
            <div class="card">
                <h3>เพิ่มคิวลูกค้า ✨</h3>
                <input type="text" id="cName" class="admin-input" placeholder="ชื่อลูกค้า">
                <input type="text" id="cSvc" class="admin-input" placeholder="งาน/บริการ">
                <input type="text" id="cLine" class="admin-input" placeholder="ID LINE หรือ เบอร์โทร (สำหรับส่งลิงก์)">
                <input type="text" id="cNote" class="admin-input" placeholder="หมายเหตุ (ถ้ามี)">
                <button class="btn-main" onclick="addQ()">เพิ่มลงรายการ</button>
            </div>
            <div id="q-list-adm"></div>
        </div>
    </div>

    <nav class="nav-bottom">
        <div class="nav-btn active" id="btn-pub" onclick="show('pub')">🏠</div>
        <div class="nav-btn" id="btn-adm" onclick="show('adm')">⚙️</div>
    </nav>

<script>
    let qs = JSON.parse(localStorage.getItem('myQs')) || [];

    // ฟังก์ชันส่งข้อความหาลูกค้า
    function notifyClient(qId) {
        const q = qs.find(x => x.id === qId);
        const msg = encodeURIComponent(`สวัสดีค่ะคุณ ${q.name} ✨ คิวที่ #${q.id} (${q.svc}) ถึงลำดับของคุณแล้วนะคะ รบกวนทักหาทางร้านได้เลยค่า 🎀`);
        // สร้างลิงก์สำหรับส่งข้อความ
        window.open(`https://line.me/R/msg/text/?${msg}`, '_blank');
    }

    function renderPub() {
        const list = document.getElementById('q-list-pub');
        const key = document.getElementById('searchQ').value;
        const filtered = qs.filter(q => q.id.toString().includes(key) || q.name.includes(key));

        list.innerHTML = filtered.map(q => `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-weight:700; font-size:1.4rem; color:var(--blue2);">#${q.id}</span>
                    <span class="status-badge">${q.prog == 100 ? 'เสร็จเรียบร้อย' : 'กำลังรอนะคะ'}</span>
                </div>
                <div style="margin-top:10px;">
                    <strong style="font-size:1.1rem;">คุณ${q.name}</strong>
                    <div style="font-size:0.8rem; color:#636e72;">งาน: ${q.svc} | ${q.date}</div>
                    ${q.note ? `<div style="font-size:0.75rem; color:#ff7675; margin-top:5px;">📝 ${q.note}</div>` : ''}
                </div>
                <div style="font-size:0.7rem; margin-top:15px; text-align:right;">ความคืบหน้า: ${q.prog}%</div>
                <div class="prog-outer"><div class="prog-inner" style="width:${q.prog}%"></div></div>
            </div>
        `).join('') || '<p style="text-align:center; opacity:0.5; margin-top:20px;">ไม่พบข้อมูลคิวค่ะ 🎀</p>';
    }

    function renderAdm() {
        const list = document.getElementById('q-list-adm');
        list.innerHTML = qs.map(q => `
            <div class="card">
                <strong>#${q.id} คุณ${q.name}</strong>
                <p style="font-size:0.8rem; margin:5px 0;">${q.svc}</p>
                <input type="range" min="0" max="100" step="10" value="${q.prog}" 
                       style="width:100%" onchange="updateP(${q.id}, this.value)">
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
                    <div>
                        ${q.prog >= 80 ? `<button class="btn-line" onclick="notifyClient(${q.id})">💬 แจ้งลูกค้า</button>` : `<small style="color:#aaa">ใกล้ถึง 80% ถึงจะแจ้งได้</small>`}
                    </div>
                    <button onclick="del(${q.id})" style="color:#ff7675; background:none; border:none; cursor:pointer; font-size:0.8rem;">ลบรายการ</button>
                </div>
            </div>
        `).join('');
    }

    function addQ() {
        const name = document.getElementById('cName').value;
        const svc = document.getElementById('cSvc').value;
        const note = document.getElementById('cNote').value;
        if(!name) return alert('กรุณาใส่ชื่อลูกค้าด้วยนะคะ');
        
        const date = new Date().toLocaleDateString('th-TH', {day:'numeric', month:'short'});
        const newQ = { id: qs.length + 1, name, svc, note, prog: 0, date };
        qs.push(newQ);
        save();
        document.getElementById('cName').value = '';
        document.getElementById('cSvc').value = '';
        document.getElementById('cNote').value = '';
        alert('เพิ่มคิวเรียบร้อยแล้วค่ะ! ✨');
    }

    function updateP(id, val) {
        const q = qs.find(x => x.id === id);
        q.prog = parseInt(val);
        save();
        if(val == 100) alert('งานสำเร็จ 100% แล้ว! อย่าลืมกดปุ่มแจ้งเตือนลูกค้านะคะ');
    }

    function del(id) {
        if(confirm('ต้องการลบคิวนี้ใช่ไหมคะ?')) {
            qs = qs.filter(x => x.id !== id);
            save();
        }
    }

    function save() {
        localStorage.setItem('myQs', JSON.stringify(qs));
        renderPub(); renderAdm();
    }

    function checkLogin() {
        if(document.getElementById('pw').value === "1234") {
            document.getElementById('adm-login').classList.add('hidden');
            document.getElementById('adm-content').classList.remove('hidden');
            renderAdm();
        } else { alert('รหัสผ่านไม่ถูกต้องนะคะ'); }
    }

    function show(page) {
        document.getElementById('page-pub').classList.toggle('hidden', page === 'adm');
        document.getElementById('page-adm').classList.toggle('hidden', page === 'pub');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + page).classList.add('active');
    }

    renderPub();
</script>
</body>
</html>
