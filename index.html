<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Kawaii Order Queue SaaS ✨</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- 🎨 Global Design System --- */
        :root {
            --primary-pink: #ffafcc;
            --deep-pink: #ff85a1;
            --soft-purple: #cdb4db;
            --pastel-blue: #a2d2ff;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --white: #ffffff;
            --text: #5f5f5f;
            --shadow: 0 10px 30px rgba(255, 175, 204, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Mitr', 'Nunito', sans-serif; }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffd6ec 0%, #e8dfff 100%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
        }

        /* --- ✨ Floating Particles --- */
        .particles-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1;
        }

        .heart {
            position: absolute; color: var(--primary-pink);
            animation: floatUp 8s linear infinite; opacity: 0.5;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- 📱 Layout --- */
        .container {
            width: 95%; max-width: 900px;
            margin: 40px auto; padding-bottom: 100px;
        }

        .card-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 35px;
            border: 2px solid var(--white);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 30px;
            animation: bounceIn 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes bounceIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* --- 🎀 Queue Card Design --- */
        .queue-card {
            display: flex;
            background: var(--white);
            border-radius: 25px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            position: relative;
            transition: 0.3s;
        }

        .queue-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(255, 175, 204, 0.4); }

        .indicator { width: 8px; background: var(--primary-pink); }

        .card-content { flex: 1; padding: 20px; }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }

        .order-id-tag {
            background: var(--soft-purple); color: white;
            padding: 4px 12px; border-radius: 10px; font-weight: 800; font-size: 0.85rem;
        }

        .date-badge {
            background: #f0f0f0; padding: 4px 10px; border-radius: 10px;
            font-size: 0.75rem; color: #888; font-weight: bold;
        }

        .job-title { font-size: 1.2rem; font-weight: 600; color: var(--deep-pink); margin: 10px 0 5px 0; }
        
        .customer-info { font-size: 0.95rem; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .platform-tag {
            background: var(--pastel-blue); color: white;
            padding: 2px 8px; border-radius: 6px; font-size: 0.7rem;
        }

        /* --- 📊 Progress Bar --- */
        .progress-container {
            height: 12px; background: #eee; border-radius: 10px;
            overflow: hidden; margin: 10px 0; position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-pink), var(--soft-purple));
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        .update-time { font-size: 0.7rem; color: #bbb; text-align: right; margin-top: 5px; }

        /* --- 💊 Status Pills --- */
        .status-pill-group {
            display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0;
        }

        .pill {
            padding: 8px 18px; border-radius: 50px; border: 2px solid transparent;
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
            background: #f8f8f8; transition: 0.3s; color: #888;
        }

        .pill:hover { transform: scale(1.05); background: var(--white); border-color: var(--primary-pink); }

        .pill.active {
            color: white;
            box-shadow: 0 4px 12px rgba(255, 133, 161, 0.4);
        }

        .pill-wait { background: #e0e0e0; } .pill-wait.active { background: #a0a0a0; }
        .pill-work { background: #ffe5ec; } .pill-work.active { background: #ff85a1; }
        .pill-soon { background: #f3e5f5; } .pill-soon.active { background: #ba68c8; }
        .pill-done { background: #e3f2fd; } .pill-done.active { background: #64b5f6; }
        .pill-ship { background: #e8f5e9; } .pill-ship.active { background: #81c784; }

        /* --- 🔘 Buttons --- */
        .btn-main {
            background: linear-gradient(45deg, var(--deep-pink), var(--primary-pink));
            color: white; border: none; padding: 12px 25px;
            border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 133, 161, 0.3);
            display: flex; align-items: center; gap: 8px; justify-content: center;
        }

        .btn-main:hover { transform: translateY(-3px); filter: brightness(1.1); }

        .btn-icon {
            width: 35px; height: 35px; border-radius: 10px; border: none;
            cursor: pointer; background: #f5f5f5; color: #888; transition: 0.2s;
        }

        .btn-icon:hover { background: var(--primary-pink); color: white; }

        /* --- 💬 Chat Widget --- */
        .chat-widget {
            position: fixed; bottom: 30px; right: 30px; z-index: 999;
        }

        .chat-btn {
            width: 65px; height: 65px; border-radius: 50%;
            background: var(--deep-pink); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 25px; cursor: pointer; box-shadow: var(--shadow);
        }

        .chat-box {
            position: absolute; bottom: 80px; right: 0;
            width: 320px; height: 450px; background: white;
            border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: none; flex-direction: column; overflow: hidden;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .chat-header {
            background: var(--primary-pink); padding: 15px;
            color: white; font-weight: bold; text-align: center;
        }

        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #fffcfd; }

        .msg {
            max-width: 80%; padding: 10px 15px; border-radius: 18px;
            margin-bottom: 10px; font-size: 0.85rem; line-height: 1.4;
        }

        .msg-admin { background: var(--primary-pink); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }
        .msg-user { background: var(--pastel-blue); color: white; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }

        .chat-input { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #eee; }
        .chat-input input { flex: 1; border: none; background: #f5f5f5; padding: 10px; border-radius: 15px; outline: none; }

        /* --- 🏆 Success Modal --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
        }

        .modal-content {
            background: white; padding: 40px; border-radius: 35px;
            text-align: center; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0.5); } to { transform: scale(1); } }

        .modal-icon {
            font-size: 50px; color: var(--primary-pink); margin-bottom: 20px;
        }

        /* --- Input Styles --- */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; color: var(--deep-pink); }
        input, select, textarea {
            width: 100%; padding: 12px 18px; border-radius: 15px; border: 2px solid #f0f0f0;
            outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary-pink); background: #fffcfd; }

        /* --- Admin Specific --- */
        .admin-controls { display: flex; gap: 8px; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #eee; }
    </style>
</head>
<body>

    <div class="particles-bg" id="particles"></div>

    <div class="container">
        <header style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 2.5rem; color: var(--deep-pink); margin: 0;">🎀 Kawaii Queue Dashboard</h1>
            <p style="color: #aaa; font-weight: bold; letter-spacing: 2px;">MANAGEMENT SYSTEM V.2</p>
        </header>

        <div class="card-glass" id="adminArea">
            <h2 id="formTitle"><i class="fas fa-plus-circle"></i> สร้างออเดอร์ใหม่</h2>
            <div id="orderForm">
                <input type="hidden" id="editIndex" value="-1">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>ชื่องาน / หัวข้อ</label>
                        <input type="text" id="jobTitle" placeholder="เช่น วาดรูปจิบิ">
                    </div>
                    <div class="form-group">
                        <label>ชื่อลูกค้า</label>
                        <input type="text" id="custName" placeholder="เช่น คุณดาว">
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>แพลตฟอร์ม</label>
                        <select id="platform">
                            <option value="Line">Line</option>
                            <option value="Facebook">Facebook</option>
                            <option value="Website">Website</option>
                            <option value="TikTok">TikTok</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>ความคืบหน้า (%)</label>
                        <input type="number" id="progress" min="0" max="100" value="0">
                    </div>
                </div>

                <div class="form-group">
                    <label>เลือกสถานะปัจจุบัน</label>
                    <div class="status-pill-group" id="statusPicker">
                        <div class="pill pill-wait active" onclick="setStatus('รอเริ่มงาน', this)">⏳ รอเริ่มงาน</div>
                        <div class="pill pill-work" onclick="setStatus('กำลังทำ', this)">⚙️ กำลังทำ</div>
                        <div class="pill pill-soon" onclick="setStatus('ใกล้เสร็จ', this)">✨ ใกล้เสร็จ</div>
                        <div class="pill pill-done" onclick="setStatus('เสร็จแล้ว', this)">✅ เสร็จแล้ว</div>
                        <div class="pill pill-ship" onclick="setStatus('ส่งงานแล้ว', this)">📦 ส่งงานแล้ว</div>
                    </div>
                    <input type="hidden" id="currentStatus" value="รอเริ่มงาน">
                </div>

                <button class="btn-main" style="width: 100%;" onclick="saveOrder()">
                    <i class="fas fa-heart"></i> บันทึกข้อมูลคิว
                </button>
            </div>
        </div>

        <h2 style="text-align: center; color: var(--deep-pink);"><i class="fas fa-list-ul"></i> รายการคิวงานทั้งหมด</h2>
        <div id="queueList">
            </div>
    </div>

    <div class="chat-widget">
        <div class="chat-box" id="chatBox">
            <div class="chat-header">🌸 Support Chat</div>
            <div class="chat-messages" id="chatMsgs">
                <div class="msg msg-admin">สวัสดีค่ะ มีอะไรให้แอดมินช่วยไหมคะ? ✨</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chatInput" placeholder="พิมพ์ข้อความ...">
                <button class="btn-icon" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <div class="chat-btn" onclick="toggleChat()">
            <i class="fas fa-comment-dots"></i>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">✨</div>
            <h2 style="color: var(--deep-pink); margin-top: 0;">บันทึกข้อมูลสำเร็จ!</h2>
            <p style="color: #888;">ระบบจัดการข้อมูลคิวเรียบร้อยแล้วค่ะ</p>
            <button class="btn-main" style="width: 100%; margin-top: 20px;" onclick="closeModal()">
                ตกลง 💗
            </button>
        </div>
    </div>

    <script>
        /* --- 📋 Data Logic --- */
        let orders = JSON.parse(localStorage.getItem('kawaii_saas_orders')) || [];
        let orderCounter = parseInt(localStorage.getItem('kawaii_counter')) || 1;
        let selectedStatus = "รอเริ่มงาน";

        function setStatus(status, el) {
            selectedStatus = status;
            document.getElementById('currentStatus').value = status;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
        }

        function saveOrder() {
            const title = document.getElementById('jobTitle').value;
            const name = document.getElementById('custName').value;
            const platform = document.getElementById('platform').value;
            const progress = document.getElementById('progress').value;
            const editIdx = parseInt(document.getElementById('editIndex').value);
            
            if(!title || !name) return alert("กรุณากรอกข้อมูลให้ครบนะคะ 🎀");

            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            const dateStr = now.toLocaleDateString('th-TH');

            if(editIdx === -1) {
                // NEW ORDER
                const newOrder = {
                    id: `PJ-${orderCounter.toString().padStart(3, '0')}`,
                    title, name, platform, progress,
                    status: selectedStatus,
                    date: dateStr,
                    lastUpdate: timeStr
                };
                orders.push(newOrder);
                orderCounter++;
            } else {
                // EDIT ORDER
                orders[editIdx].title = title;
                orders[editIdx].name = name;
                orders[editIdx].platform = platform;
                orders[editIdx].progress = progress;
                orders[editIdx].status = selectedStatus;
                orders[editIdx].lastUpdate = timeStr;
            }

            localStorage.setItem('kawaii_saas_orders', JSON.stringify(orders));
            localStorage.setItem('kawaii_counter', orderCounter);
            
            renderOrders();
            resetForm();
            openModal();
        }

        function renderOrders() {
            const list = document.getElementById('queueList');
            list.innerHTML = "";

            orders.forEach((o, i) => {
                const card = document.createElement('div');
                card.className = "queue-card";
                card.innerHTML = `
                    <div class="indicator" style="background: ${getStatusColor(o.status)}"></div>
                    <div class="card-content">
                        <div class="card-header">
                            <span class="order-id-tag">${o.id}</span>
                            <span class="date-badge">📅 ${o.date}</span>
                        </div>
                        <div class="job-title">${o.title}</div>
                        <div class="customer-info">
                            <strong>👤 ${o.name}</strong>
                            <span class="platform-tag">${o.platform}</span>
                        </div>
                        
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:bold;">
                            <span>Progress</span>
                            <span style="color:var(--deep-pink)">${o.progress}%</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${o.progress}%; background:${getStatusColor(o.status)}"></div>
                        </div>
                        
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <span style="font-size:0.85rem; font-weight:bold; color:${getStatusColor(o.status)}">${o.status}</span>
                            <div class="update-time">🕒 อัปเดตล่าสุด: ${o.lastUpdate} น.</div>
                        </div>

                        <div class="admin-controls">
                            <button class="btn-icon" title="Copy Message" onclick="copyFullMsg(${i})"><i class="fas fa-share-square"></i></button>
                            <button class="btn-icon" title="Copy ID" onclick="copyToClip('${o.id}')"><i class="fas fa-fingerprint"></i></button>
                            <button class="btn-icon" title="Edit" onclick="editOrder(${i})"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon" title="Delete" onclick="deleteOrder(${i})" style="color:#ffafcc"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        function getStatusColor(s) {
            if(s === 'กำลังทำ') return '#ff85a1';
            if(s === 'ใกล้เสร็จ') return '#ba68c8';
            if(s === 'เสร็จแล้ว') return '#64b5f6';
            if(s === 'ส่งงานแล้ว') return '#81c784';
            return '#bbb';
        }

        /* --- 📋 Utils --- */
        function copyToClip(text) {
            navigator.clipboard.writeText(text);
            alert("คัดลอก '" + text + "' แล้วค่ะ ✨");
        }

        function copyFullMsg(i) {
            const o = orders[i];
            const msg = `เลขออเดอร์: ${o.id}\nลูกค้า: ${o.name}\nงาน: ${o.title}\nวันที่รับงาน: ${o.date}\nสถานะ: ${o.status} (${o.progress}%)\nอัปเดตล่าสุด: ${o.lastUpdate} น.`;
            copyToClip(msg);
        }

        function editOrder(i) {
            const o = orders[i];
            document.getElementById('jobTitle').value = o.title;
            document.getElementById('custName').value = o.name;
            document.getElementById('platform').value = o.platform;
            document.getElementById('progress').value = o.progress;
            document.getElementById('editIndex').value = i;
            document.getElementById('formTitle').innerHTML = "📝 แก้ไขออเดอร์ " + o.id;
            
            // Set status pill active
            const pills = document.querySelectorAll('.pill');
            pills.forEach(p => {
                if(p.innerText.includes(o.status)) setStatus(o.status, p);
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteOrder(i) {
            if(confirm("ลบออเดอร์นี้ใช่ไหมคะ? 🥺")) {
                orders.splice(i, 1);
                localStorage.setItem('kawaii_saas_orders', JSON.stringify(orders));
                renderOrders();
            }
        }

        function resetForm() {
            document.getElementById('orderForm').querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('editIndex').value = "-1";
            document.getElementById('progress').value = 0;
            document.getElementById('formTitle').innerHTML = "<i class='fas fa-plus-circle'></i> สร้างออเดอร์ใหม่";
        }

        /* --- 🏠 UI Effects --- */
        function toggleChat() {
            const box = document.getElementById('chatBox');
            box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            const chatMsgs = document.getElementById('chatMsgs');
            
            chatMsgs.innerHTML += `<div class="msg msg-user">${input.value}</div>`;
            input.value = "";
            chatMsgs.scrollTop = chatMsgs.scrollHeight;

            setTimeout(() => {
                chatMsgs.innerHTML += `<div class="msg msg-admin">แอดมินรับทราบค่ะ จะรีบตรวจสอบข้อมูลให้นะคะ 🫧</div>`;
                chatMsgs.scrollTop = chatMsgs.scrollHeight;
            }, 1000);
        }

        function openModal() { document.getElementById('successModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('successModal').style.display = 'none'; }

        // Heart Background
        function createHearts() {
            const container = document.getElementById('particles');
            const icons = ['💗', '✨', '🌸', '🍬'];
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart';
                h.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                h.style.left = Math.random() * 100 + "vw";
                h.style.animationDuration = (Math.random() * 3 + 5) + "s";
                container.appendChild(h);
                setTimeout(() => h.remove(), 8000);
            }, 1500);
        }

        window.onload = () => {
            renderOrders();
            createHearts();
        };
    </script>
</body>
</html>
