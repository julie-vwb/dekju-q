    :root {

    .gradient-btn {
        background: linear-gradient(135deg, #b78bdb 0%, #f472b6 100%);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .gradient-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(180, 83, 205, 0.3);
    }

    .gradient-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        transition: left 0.5s;
    }

    .gradient-btn:hover::before {
        left: 100%;
    }

    .card-cute {
        background: white;
        border: 2px solid #e9d5ff;
        border-radius: 20px;
        padding: 20px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .card-cute::before {
        content: '✨';
        position: absolute;
        top: -10px;
        right: -10px;
        font-size: 40px;
        opacity: 0.2;
    }

    .card-cute:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 30px rgba(180, 83, 205, 0.15);
        border-color: #c084fc;
    }

    .status-badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 12px;
        transition: all 0.3s ease;
    }

    .status-waiting {
        background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
        color: #1e40af;
    }

    .status-progress {
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        color: #92400e;
    }

    .status-completed {
        background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
        color: #15803d;
    }

    .progress-bar {
        height: 8px;
        background: #e9d5ff;
        border-radius: 10px;
        overflow: hidden;
        margin: 10px 0;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #b78bdb 0%, #f472b6 100%);
        border-radius: 10px;
        transition: width 0.5s ease;
        position: relative;
    }

    .progress-fill::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
        0% { left: -100%; }
        100% { left: 100%; }
    }

    .input-cute {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e9d5ff;
        border-radius: 15px;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .input-cute:focus {
        outline: none;

                                            <p className="text-sm text-purple-800 mb-2">{selectedOrder.updateMessage}</p>
                                            <p className="text-xs text-purple-400">
                                                📅 {new Date(selectedOrder.lastUpdate).toLocaleDateString('th-TH', {
                                                    year: 'numeric',
                                                    month: 'long',
                                                    day: 'numeric'
                                                })}
                                            </p>
                                        </div>
                                    </div>

                                    <div className="space-y-3 mb-6">
                                        <p className="text-sm font-bold text-purple-700">📞 ติดต่อแอดมิน</p>
                                        <div className="flex gap-3">
                                            <a
                                                href={`https://line.me/ti/p/${selectedOrder.lineId}`}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="flex-1 contact-button contact-line text-center"
                                            >
                                                💬 ติดต่อ LINE
                                            </a>
                                            <a
                                                href={`https://www.facebook.com/search/top/?q=${encodeURIComponent(selectedOrder.facebookName)}`}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="flex-1 contact-button contact-facebook text-center"
                                            >
                                                f ติดต่อ Facebook
                                            </a>
                                        </div>
                                    </div>

                                    <button
                                        onClick={() => setSelectedOrder(null)}
                                        className="w-full gradient-btn text-white font-bold py-3 px-4 rounded-15"
                                    >
                                        ✕ ปิด
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // LOGIN PAGE
        if (!isAdminLogin && currentPage === 'login') {
            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="card-cute max-w-md w-full">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black text-purple-900 mb-2">🔐 Admin Login</h1>
                            <p className="text-purple-600">เข้าสู่ระบบจัดการออเดอร์</p>
                        </div>

                        <form onSubmit={handleAdminLogin} className="space-y-4">
                            <div>
                                <label className="form-label">🔑 รหัสผ่าน</label>
                                <input
                                    type="password"
                                    value={adminPassword}
                                    onChange={(e) => setAdminPassword(e.target.value)}
                                    placeholder="กรุณากรอกรหัสผ่าน"
                                    className="form-input"
                                />
                                <p className="text-xs text-purple-500 mt-1">💡 รหัสผ่าน: admin123</p>
                            </div>

                            <button
                                type="submit"
                                className="w-full gradient-btn text-white font-bold py-3 px-4 rounded-15 text-lg"
                            >
                                🚀 เข้าสู่ระบบ
                            </button>
                        </form>

                        <button
                            onClick={() => setCurrentPage('search')}
                            className="w-full mt-4 bg-purple-100 hover:bg-purple-200 text-purple-700 font-bold py-2 px-4 rounded-12 transition"
                        >
                            ← กลับไป
                        </button>
                    </div>
                </div>
            );
        }

        // ADMIN DASHBOARD
        if (isAdminLogin) {
            return (
                <div className="min-h-screen py-6 px-4">
                    <div className="max-w-5xl mx-auto">
                        {/* Admin Header */}
                        <div className="cute-header mb-8 flex justify-between items-center">
                            <div>
                                <h1 className="text-3xl font-black mb-1">💎 Admin Dashboard</h1>
                                <p className="text-purple-100">จัดการออเดอร์ของคุณ</p>
                            </div>
                            <button
                                onClick={handleLogout}
                                className="bg-white text-purple-700 font-bold py-2 px-4 rounded-12 hover:bg-purple-100 transition"
                            >
                                🚪 ออกจากระบบ
                            </button>
                        </div>

                        {/* Stats */}
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                            <div className="dashboard-stat">
                                <div className="stat-number">{orders.length}</div>
                                <div className="stat-label">📦 ทั้งหมด</div>
                            </div>
                            <div className="dashboard-stat">
                                <div className="stat-number">{orders.filter(o => o.status === 'in-progress').length}</div>
                                <div className="stat-label">⚡ กำลังทำ</div>
                            </div>
                            <div className="dashboard-stat">
                                <div className="stat-number">{orders.filter(o => o.status === 'completed').length}</div>
                                <div className="stat-label">✨ เสร็จแล้ว</div>
                            </div>
                            <div className="dashboard-stat">
                                <div className="stat-number">{orders.filter(o => o.status === 'waiting').length}</div>
                                <div className="stat-label">⏳ รอเริ่ม</div>
                            </div>
                        </div>

                        {/* Add Button */}
                        <div className="mb-8">
                            <button
                                onClick={() => {
                                    setShowNewOrderForm(!showNewOrderForm);
                                    setEditingOrder(null);
                                }}
                                className="gradient-btn text-white font-bold py-3 px-6 rounded-15 text-lg"
                            >
                                ➕ เพิ่มออเดอร์ใหม่
                            </button>
                        </div>

                        {/* New Order Form */}
                        {showNewOrderForm && (
                            <div className="card-cute mb-8 border-2 border-purple-400">
                                <OrderForm
                                    order={null}
                                    statusLabels={statusLabels}
                                    onSave={handleSaveOrder}
                                    onCancel={() => setShowNewOrderForm(false)}
                                />
                            </div>
                        )}

                        {/* Orders List */}
                        <div className="space-y-4">
                            <h2 className="section-title">
                                <span className="emoji-icon">📋</span>
                                รายการออเดอร์
                            </h2>
                            {orders.map(order => (
                                <div key={order.id} className="card-cute">
                                    <div className="flex justify-between items-start mb-3">
                                        <div>
                                            <h3 className="text-lg font-bold text-purple-900">Order #{order.id}</h3>
                                            <p className="text-sm text-purple-600">{order.customerName} • {order.jobDescription}</p>
                                        </div>
                                        <span className={`status-badge ${getStatusBadge(order.status)}`}>
                                            {statusLabels[order.status]}
                                        </span>
                                    </div>

                                    <div className="mb-3">
                                        <div className="flex justify-between text-xs text-purple-500 mb-1">
                                            <span>⚡ ความคืบหน้า</span>
                                            <span className="font-bold">{order.progress}%</span>
                                        </div>
                                        <div className="progress-bar">
                                            <div className="progress-fill" style={{ width: `${order.progress}%` }}></div>
                                        </div>
                                    </div>

                                    <div className="bg-purple-50 rounded-12 p-3 mb-3 text-sm">
                                        <p className="text-purple-800">{order.updateMessage}</p>
                                        <p className="text-xs text-purple-400 mt-1">📅 {new Date(order.lastUpdate).toLocaleDateString('th-TH')}</p>
                                    </div>

                                    <div className="flex gap-2">
                                        <button
                                            onClick={() => setEditingOrder(order)}
                                            className="flex-1 gradient-btn text-white font-bold py-2 px-3 rounded-12 text-sm transition"
                                        >
                                            ✏️ แก้ไข
                                        </button>
                                        <button
                                            onClick={() => handleDeleteOrder(order.id)}
                                            className="flex-1 bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-3 rounded-12 text-sm transition"
                                        >
                                            🗑️ ลบ
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Edit Modal */}
                        {editingOrder && (
                            <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50">
                                <div className="modal-content max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                    <OrderForm
                                        order={editingOrder}
                                        statusLabels={statusLabels}
                                        onSave={handleSaveOrder}
                                        onCancel={() => setEditingOrder(null)}
                                    />
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
    };

    const OrderForm = ({ order, statusLabels, onSave, onCancel }) => {
        const [formData, setFormData] = React.useState(order || {
            queueNumber: 0,
            customerName: '',
            phone: '',
            email: '',
            lineId: '',
            facebookName: '',
            jobDescription: '',
            receivedDate: new Date().toISOString().split('T')[0],
            status: 'waiting',
            progress: 0,
            updateMessage: '',
            lastUpdate: new Date().toISOString().split('T')[0],
        });

        const statusOptions = ['waiting', 'in-progress', 'completed'];

        const handleSubmit = (e) => {
            e.preventDefault();
            onSave(formData);
        };

        return (
            <form onSubmit={handleSubmit} className="p-6 space-y-4">
                <h2 className="text-2xl font-bold text-purple-900 mb-6">
                    {order ? `✏️ แก้ไข Order #${order.id}` : '➕ เพิ่มออเดอร์ใหม่'}
                </h2>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="form-group">
                        <label className="form-label">👤 ชื่อลูกค้า *</label>
                        <input
                            type="text"
                            required
                            value={formData.customerName}
                            onChange={(e) => setFormData({ ...formData, customerName: e.target.value })}
                            className="form-input"
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">💬 LINE ID</label>
                        <input
                            type="text"
                            value={formData.lineId}
                            onChange={(e) => setFormData({ ...formData, lineId: e.target.value })}
                            className="form-input"
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">f Facebook</label>
                        <input
                            type="text"
                            value={formData.facebookName}
                            onChange={(e) => setFormData({ ...formData, facebookName: e.target.value })}
                            className="form-input"
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">📞 เบอร์โทรศัพท์</label>
                        <input
                            type="text"
                            value={formData.phone}
                            onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                            className="form-input"
                        />
                    </div>
                </div>

                <div className="form-group">
                    <label className="form-label">📋 รายละเอียดงาน *</label>
                    <textarea
                        required
                        value={formData.jobDescription}
                        onChange={(e) => setFormData({ ...formData, jobDescription: e.target.value })}
                        className="form-textarea"
                    />
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="form-group">
                        <label className="form-label">📅 วันที่รับงาน</label>
                        <input
                            type="date"
                            value={formData.receivedDate}
                            onChange={(e) => setFormData({ ...formData, receivedDate: e.target.value })}
                            className="form-input"
                        />
                    </div>
                    <div className="form-group">
                        <label className="form-label">✓ สถานะ</label>
                        <select
                            value={formData.status}
                            onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                            className="form-select"
                        >
                            {statusOptions.map(status => (
                                <option key={status} value={status}>
                                    {statusLabels[status] || status}
                                </option>
                            ))}
                        </select>
                    </div>
                </div>

                <div className="form-group">
                    <label className="form-label">⚡ ความคืบหน้า ({formData.progress}%)</label>
                    <input
                        type="range"
                        min="0"
                        max="100"
                        step="5"
                        value={formData.progress}
                        onChange={(e) => setFormData({ ...formData, progress: parseInt(e.target.value) })}
                        className="range-slider"
                    />
                </div>

                <div className="form-group">
                    <label className="form-label">💬 ข้อความอัปเดต</label>
                    <textarea
                        value={formData.updateMessage}
                        onChange={(e) => setFormData({ ...formData, updateMessage: e.target.value })}
                        className="form-textarea"
                        placeholder="เขียนข้อความอัปเดตให้ลูกค้าเห็น"
                    />
                </div>

                <div className="flex gap-3 pt-4">
                    <button
                        type="submit"
                        className="flex-1 gradient-btn text-white font-bold py-3 px-4 rounded-15 transition"
                    >
                        ✅ บันทึก
                    </button>
                    <button
                        type="button"
                        onClick={onCancel}
                        className="flex-1 bg-purple-200 hover:bg-purple-300 text-purple-800 font-bold py-3 px-4 rounded-15 transition"
                    >
                        ✕ ยกเลิก
                    </button>
                </div>
            </form>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OrderQueueSystem />);
</script>
```
