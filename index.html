<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Queue System — PINK JULIE ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #fff0f6 0%, #e6f7ff 100%);
            --pink-accent: #ff85c0;
            --pink-soft: #ffdeeb;
            --grad-pink: linear-gradient(90deg, #ff9a9e, #fecfef, #ff9a9e);
            --radius-main: 35px;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mitr', sans-serif; }
        body { background: var(--bg-grad); background-attachment: fixed; min-height: 100vh; color: #595959; }

        header { padding: 40px 20px; text-align: center; }
        .profile-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; padding: 5px; background: white; box-shadow: 0 10px 25px rgba(255,133,192,0.3); border: 2px solid var(--pink-soft); overflow: hidden; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .shop-name { font-size: 1.8rem; font-weight: 600; color: var(--pink-accent); }
        .nav-pill { display: inline-flex; background: #fff; padding: 6px; border-radius: 999px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-btn { padding: 12px 25px; border-radius: 999px; border: none; cursor: pointer; font-size: 0.9rem; color: #ccc; background: transparent; transition: 0.3s; }
        .nav-btn.active { background: var(--grad-pink); color: #fff; box-shadow: 0 4px 10px rgba(255,154,158,0.3); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }
        .q-card { background: white; border-radius: var(--radius-main); padding: 30px; margin-bottom: 25px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.06); border: 1.5px solid rgba(255,255,255,0.8); }
        
        /* แก้ไขตำแหน่ง PJ-Number ไม่ให้ทับขอบ */
        .q-no { position: absolute; top: 30px; right: 30px; font-size: 0.75rem; font-weight: 600; color: white; background: var(--grad-pink); padding: 5px 15px; border-radius: 12px; }

        .progress-container { background: #f2f2f2; border-radius: 20px; height: 18px; overflow: hidden; margin: 15px 0; border: 1px solid #fff; }
        .progress-bar { height: 100%; width: 0%; background: var(--grad-pink); background-size: 200% 100%; transition: width 1s ease; animation: progressMoving 2s linear infinite; }
        @keyframes progressMoving { 0% { background-position: 0% 0%; } 100% { background-position: -200% 0%; } }

        /* Chat Widget & Notification */
        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        #chat-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--grad-pink); border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(255,133,192,0.5); display: flex; align-items: center; justify-content: center; font-size: 28px; position: relative; }
        .notif-badge { position: absolute; top: 0; right: 0; width: 18px; height: 18px; background: #ff4d4f; border-radius: 50%; border: 2px solid #fff; display: none; }
        
        #chat-box { position: fixed; bottom: 110px; right: 30px; width: 340px; height: 500px; background: white; border-radius: 40px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; border: 3px solid #fff; animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .chat-header { background: var(--grad-pink); color: white; padding: 20px; font-weight: 600; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #fffcfd; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.9rem; line-height: 1.5; }
        .msg-admin { background: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 5px; color: #555; }
        .msg-user { background: var(--pink-soft); color: var(--pink-accent); align-self: flex-end; border-bottom-right-radius: 5px; }
        
        .chat-input-area { padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee; }
        .chat-input { flex: 1; border: 2px solid #ffdeeb; padding: 12px 20px; border-radius: 25px; outline: none; }
        .chat-send { background: var(--pink-accent); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .btn-sm { background: var(--pink-soft); color: var(--pink-accent); border: none; padding: 10px 18px; border-radius: 18px; font-size: 0.8rem; font-weight: 600; cursor: pointer; }
        .btn-finish { background: var(--grad-pink); color: white; border-radius: 20px; padding: 10px 25px; margin-left: auto; }
        .toast { position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 12px 30px; border-radius: 30px; display: none; z-index: 10000; }
    </style>
</head>
<body>

<header>
    <div class="profile-container">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Julie&backgroundColor=ffdeeb" class="profile-img">
    </div>
    <div class="shop-name">PINK — JULIE</div>
    <div class="nav-pill">
        <button class="nav-btn active" id="tab-pub" onclick="goPage('pub')">เช็คคิวงาน</button>
        <button class="nav-btn" id="tab-adm" onclick="tryAdmin()">แอดมินร้าน</button>
    </div>
</header>

<div class="container">
    <main id="page-pub">
        <div id="list-q"></div>
    </main>
    <main id="page-adm" style="display:none;"><div id="admin-content"></div></main>
</div>

<div id="chat-widget">
    <div id="chat-box">
        <div class="chat-header">Julie Support ✨</div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="พิมพ์คุยกับแอดมิน...">
            <button class="chat-send" onclick="sendMessage('user')">✈️</button>
        </div>
    </div>
    <button id="chat-btn" onclick="toggleChat()">
        💬 <div class="notif-badge" id="notif-badge"></div>
    </button>
</div>

<div id="toast" class="toast"></div>

<script>
    let db = JSON.parse(localStorage.getItem('pj_final_fixed')) || { q: [], chats: [], unread: false, nextNo: 1 };
    let authed = false;

    function save() { localStorage.setItem('pj_final_fixed', JSON.stringify(db)); render(); }

    function render() {
        const qContainer = document.getElementById('list-q');
        qContainer.innerHTML = db.q.length === 0 ? `<div style="text-align:center; padding:40px; color:#ccc;">ยังไม่มีคิวงานจ้า</div>` : 
            db.q.map(x => `
                <div class="q-card">
                    <div class="q-no">${x.no}</div>
                    <div style="font-weight:600; font-size:1.1rem;">คุณ ${x.name}</div>
                    <div style="font-size:0.85rem; color:#999;">${x.svc}</div>
                    <div class="progress-container"><div class="progress-bar" style="width:${x.progress}%"></div></div>
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--pink-accent); font-weight:600;">
                        <span>อัปเดตล่าสุด</span>
                        <span>${x.progress}%</span>
                    </div>
                </div>
            `).join('');

        if (authed && document.getElementById('admin-content')) {
            document.getElementById('admin-content').innerHTML = `
                <div class="q-card" style="border: 2px solid var(--pink-soft);">
                    <div style="font-weight:600; color:var(--pink-accent); margin-bottom:15px;">🎀 เพิ่มคิวใหม่</div>
                    <input type="text" id="in-name" class="chat-input" style="width:100%; margin-bottom:10px;" placeholder="ชื่อลูกค้า">
                    <input type="text" id="in-svc" class="chat-input" style="width:100%; margin-bottom:15px;" placeholder="งานที่สั่ง">
                    <button class="btn-finish" style="width:100%; height:50px;" onclick="addNewOrder()">บันทึกคิว ✨</button>
                </div>
                <div id="adm-q-list"></div>
                <div class="q-card" style="margin-top:20px;">
                    <div style="font-weight:600; margin-bottom:10px;">💬 ห้องแชทและตอบกลับ</div>
                    <div id="adm-chat-history" style="max-height:180px; overflow-y:auto; margin-bottom:15px; font-size:0.85rem;"></div>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="adm-reply-input" class="chat-input" style="padding:10px 15px;" placeholder="พิมพ์ตอบลูกค้า...">
                        <button class="btn-sm btn-finish" style="margin:0;" onclick="sendMessage('admin')">ส่ง</button>
                    </div>
                </div>
            `;
            renderAdminQ();
            renderAdminChatHistory();
        }
        renderMessages();
        document.getElementById('notif-badge').style.display = db.unread ? 'block' : 'none';
    }

    function renderAdminQ() {
        document.getElementById('adm-q-list').innerHTML = db.q.map(x => `
            <div class="q-card">
                <div class="q-no">${x.no}</div>
                <div style="font-weight:600;">คุณ ${x.name}</div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-sm" onclick="updateQ(${x.id})">+10%</button>
                    <button class="btn-sm" style="background:#e6f7ff; color:#1890ff;" onclick="copyCap('${x.name}', '${x.no}')">ก๊อปแคปชั่น 📋</button>
                    <button class="btn-finish" onclick="delQ(${x.id})">ลบ</button>
                </div>
            </div>
        `).join('');
    }

    function sendMessage(role) {
        const input = document.getElementById(role === 'user' ? 'chat-input' : 'adm-reply-input');
        if (!input.value) return;
        db.chats.push({ role, text: input.value });
        if (role === 'user') {
            db.unread = true;
            setTimeout(() => {
                db.chats.push({ role: 'admin', text: 'รอ 1-5 นาที แอดมินจะทำการตอบกลับให้ไวที่สุดนะคะ 🌸' });
                save();
            }, 800);
        } else { db.unread = false; }
        input.value = '';
        save();
    }

    function renderMessages() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = `<div class="msg msg-admin">สวัสดีค่ะ มีอะไรให้ Julie ช่วยไหมคะ? ✨</div>` + 
            db.chats.map(m => `<div class="msg msg-${m.role}">${m.text}</div>`).join('');
        container.scrollTop = container.scrollHeight;
    }

    function renderAdminChatHistory() {
        const container = document.getElementById('adm-chat-history');
        if (container) container.innerHTML = db.chats.map(m => `<div style="margin-bottom:5px;"><strong>${m.role==='user'?'ลูกค้า':'แอดมิน'}:</strong> ${m.text}</div>`).join('');
    }

    function copyCap(name, no) {
        const text = `ลงออเดอร์เรียบร้อยนะคะคุณ ${name} ✨\n` +
                     `เลขออเดอร์ของคุณคือ ${no} นะคะ 🎀\n` +
                     `ขอบคุณที่ไว้วางใจให้ ดูแลนะคะ รองานสวยๆ ได้เลย จะรีบปั่นให้สุดฝีมือเลยค่ะ! 🔥\n\n` +
                     `🔍 ตรวจสอบสถานะคิวได้ที่นี่น้า:\n` +
                     `https://julie-vwb.github.io/dekju-q/\n` +
                     `(ใส่หมายเลขออเดอร์ในช่องค้นหาได้เลยค่ะ)`;
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.innerText = "คัดลอกข้อความแล้วค่ะ ✨";
            t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000);
        });
    }

    function addNewOrder() {
        const n = document.getElementById('in-name').value;
        const s = document.getElementById('in-svc').value;
        if (n) {
            db.q.push({ id: Date.now(), no: "PJ-" + db.nextNo.toString().padStart(3, '0'), name: n, svc: s, progress: 0 });
            db.nextNo++;
            save();
        }
    }

    function updateQ(id) { const i = db.q.find(x => x.id === id); if (i) { i.progress = Math.min(i.progress + 10, 100); save(); } }
    function delQ(id) { if(confirm('ลบ?')) { db.q = db.q.filter(x => x.id !== id); save(); } }
    function goPage(p) { document.getElementById('page-pub').style.display = p === 'pub' ? 'block' : 'none'; document.getElementById('page-adm').style.display = p === 'adm' ? 'block' : 'none'; document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + p)); render(); }
    function tryAdmin() { if (prompt("รหัส:") === '1234') { authed = true; goPage('adm'); } }
    function toggleChat() { document.getElementById('chat-box').style.display = document.getElementById('chat-box').style.display === 'flex' ? 'none' : 'flex'; if (authed) db.unread = false; save(); }

    render();
</script>
</body>
</html>
