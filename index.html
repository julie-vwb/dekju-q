<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Queue System</title>

<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Mitr',sans-serif;
background:linear-gradient(180deg,#ffd6ec,#e8dfff,#dff1ff);
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:white;
border-radius:25px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input,textarea{
width:100%;
padding:10px;
border:none;
border-radius:12px;
background:#f3f3f3;
margin-top:6px;
margin-bottom:10px;
font-family:'Mitr';
}

button{
border:none;
padding:10px 20px;
border-radius:30px;
background:linear-gradient(45deg,#ff9bd5,#bda6ff);
color:white;
cursor:pointer;
}

.progress{
height:16px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:8px;
}

.progress-bar{
height:100%;
background:linear-gradient(90deg,#ff8ed6,#ffd6f3,#ff8ed6);
background-size:200%;
animation:shine 2s linear infinite;
}

@keyframes shine{
0%{background-position:200%}
100%{background-position:-200%}
}

.status{
display:inline-block;
background:#ffd6f3;
padding:4px 12px;
border-radius:20px;
margin-top:5px;
}

.adminBtn{
text-align:center;
margin-top:40px;
cursor:pointer;
font-size:18px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:white;
padding:30px;
border-radius:25px;
width:300px;
}

</style>

</head>

<body>

<div class="container">

<h1>📋 ตรวจสอบคิวงาน</h1>

<div class="card">

<h3>ค้นหา Order</h3>

<input id="searchInput" placeholder="Order ID หรือ ชื่อลูกค้า">

<button onclick="searchOrder()">ค้นหา</button>

</div>

<div id="orderList"></div>

<div class="card">

<h3>💬 ติดต่อแอดมิน</h3>

<p>กรุณายืนยัน Order ID ก่อน</p>

<input id="verifyOrderInput" placeholder="Order ID">

<button onclick="verifyOrder()">ตรวจสอบ</button>

<div id="verifyResult"></div>

<div id="chatArea" style="display:none">

<textarea id="chatMessage" placeholder="พิมพ์ข้อความ"></textarea>

<button onclick="sendMessage()">ส่งข้อความ</button>

<p id="chatStatus"></p>

</div>

</div>

<div class="adminBtn" onclick="openLogin()">

⚙️ Admin

</div>

</div>

<div class="popup" id="loginPopup">

<div class="popupBox">

<h3>Admin Login</h3>

<input id="adminPassword" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<div class="container" id="adminPanel" style="display:none">

<h1>Admin Panel</h1>

<div class="card">

<h3>➕ เพิ่ม Order</h3>

<input id="customerName" placeholder="ชื่อลูกค้า">

<textarea id="jobDetail" placeholder="รายละเอียดงาน"></textarea>

<button onclick="addOrder()">เพิ่ม Order</button>

</div>

<div id="adminOrders"></div>

</div>

<script>

let orders=JSON.parse(localStorage.getItem("orders"))||[]

let messages=JSON.parse(localStorage.getItem("messages"))||[]

let verifiedOrder=null

function save(){

localStorage.setItem("orders",JSON.stringify(orders))

renderOrders()

renderAdmin()

}

function generateID(){

return "A"+String(orders.length+1).padStart(3,"0")

}

function addOrder(){

let order={

id:generateID(),

name:customerName.value,

detail:jobDetail.value,

status:"กำลังทำ",

progress:0

}

orders.push(order)

save()

customerName.value=""
jobDetail.value=""

}

function renderOrders(){

let box=document.getElementById("orderList")

box.innerHTML=""

orders.forEach(o=>{

box.innerHTML+=`

<div class="card">

<h3>${o.id}</h3>

<p><b>${o.name}</b></p>

<p>${o.detail}</p>

<div class="status">${o.status}</div>

<div class="progress">

<div class="progress-bar" style="width:${o.progress}%"></div>

</div>

${o.progress}%

</div>

`

})

}

function searchOrder(){

let q=searchInput.value.toLowerCase()

let result=orders.filter(o=>

o.id.toLowerCase().includes(q) ||

o.name.toLowerCase().includes(q)

)

let box=document.getElementById("orderList")

box.innerHTML=""

result.forEach(o=>{

box.innerHTML+=`

<div class="card">

<h3>${o.id}</h3>

<p>${o.name}</p>

<div class="progress">

<div class="progress-bar" style="width:${o.progress}%"></div>

</div>

${o.progress}%

</div>

`

})

}

function verifyOrder(){

let id=verifyOrderInput.value.trim()

let order=orders.find(o=>o.id===id)

if(!order){

verifyResult.innerHTML="<p style='color:red'>ไม่พบ Order</p>"

chatArea.style.display="none"

return

}

verifiedOrder=order

verifyResult.innerHTML="<p style='color:green'>ยืนยันสำเร็จ</p>"

chatArea.style.display="block"

}

function sendMessage(){

if(!verifiedOrder){

alert("ต้องยืนยัน Order ก่อน")

return

}

let text=chatMessage.value

messages.push({

order:verifiedOrder.id,

message:text,

time:new Date().toLocaleString()

})

localStorage.setItem("messages",JSON.stringify(messages))

chatStatus.innerText="ส่งข้อความแล้ว"

chatMessage.value=""

}

function openLogin(){

loginPopup.style.display="flex"

}

function login(){

if(adminPassword.value==="admin123"){

loginPopup.style.display="none"

adminPanel.style.display="block"

renderAdmin()

}else{

alert("รหัสผิด")

}

}

function renderAdmin(){

let box=document.getElementById("adminOrders")

box.innerHTML=""

orders.forEach((o,i)=>{

box.innerHTML+=`

<div class="card">

<h3>${o.id}</h3>

<p>${o.name}</p>

<input type="range"

min="0"

max="100"

value="${o.progress}"

onchange="updateProgress(${i},this.value)">

<button onclick="deleteOrder(${i})">ลบ</button>

</div>

`

})

}

function updateProgress(i,val){

orders[i].progress=val

save()

}

function deleteOrder(i){

orders.splice(i,1)

save()

}

renderOrders()

</script>

</body>
</html>
