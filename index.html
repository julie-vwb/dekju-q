<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pinkjujapipi – Web Studio 🎀</title>
<link href="https://fonts.googleapis.com/css2?family=Itim&family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-main: #a2d2ff;
    --purple-main: #c8b6ff;
    --purple-deep: #9381ff;
    --blue-soft: #f0f7ff;
    --purple-soft: #f8f7ff;
    --white: #ffffff;
    --text-dark: #5a5a75;
    /* ฟอนต์ที่ให้ฟีลเดียวกับ Mirt */
    --font-mirt: 'Itim', cursive;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-mirt);
    background: linear-gradient(135deg, var(--blue-soft) 0%, var(--purple-soft) 100%);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- 🌸 Floating Emoji (ฟุ้งๆ ข้างหลัง) --- */
  .emoji-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: -1;
  }
  .emoji {
    position: absolute; font-size: 20px; opacity: 0.4;
    animation: float 10s linear infinite;
  }
  @keyframes float {
    0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
    50% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  /* --- 🎀 Header & Nav --- */
  nav {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(15px);
    padding: 12px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 100;
    border-bottom: 2px solid var(--purple-main);
  }
  .brand { font-size: 2rem; color: var(--purple-deep); text-shadow: 2px 2px #fff; }
  .nav-right { display: flex; gap: 8px; }
  .btn-nav {
    background: var(--purple-main); color: white; border: none;
    padding: 6px 15px; border-radius: 50px; cursor: pointer;
    font-family: var(--font-mirt); font-size: 1.1rem; transition: 0.3s;
  }

  /* --- 🏠 Main Container --- */
  .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }

  .card {
    background: white; border-radius: 25px; padding: 25px;
    box-shadow: 0 10px 25px rgba(147, 129, 255, 0.15);
    margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.6);
  }

  .title-section {
    display: flex; align-items: center; gap: 10px;
    font-size: 1.4rem; color: var(--purple-deep); margin-bottom: 15px;
  }

  /* --- 📊 Progress & Queue --- */
  .q-card {
    background: var(--white); border-radius: 20px; padding: 18px;
    margin-bottom: 15px; border-left: 10px solid var(--blue-main);
    transition: 0.3s; position: relative;
  }
  .q-card.active { border-left-color: var(--purple-deep); transform: scale(1.02); }
  
  .q-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .q-name { font-size: 1.3rem; color: var(--text-dark); }
  .q-num { background: var(--purple-soft); color: var(--purple-deep); padding: 2px 10px; border-radius: 10px; }
  
  .progress-wrapper { margin-top: 12px; }
  .bar-bg { background: #eee; height: 14px; border-radius: 10px; overflow: hidden; }
  .bar-fill { 
    height: 100%; background: linear-gradient(90deg, var(--blue-main), var(--purple-deep));
    transition: width 0.6s ease-in-out;
  }
  .percent-tag { font-size: 1rem; color: var(--purple-deep); text-align: right; display: block; }

  /* --- ⚙️ Admin Style --- */
  .admin-box { display: none; }
  .input-ui {
    width: 100%; padding: 12px; border-radius: 15px; border: 2px solid var(--purple-main);
    margin-bottom: 10px; font-family: var(--font-mirt); font-size: 1.1rem; outline: none;
  }
  .btn-add {
    width: 100%; padding: 10px; border: none; background: var(--purple-deep);
    color: white; border-radius: 15px; font-family: var(--font-mirt); font-size: 1.2rem;
  }
  .adm-item {
    background: var(--blue-soft); padding: 15px; border-radius: 15px; margin-bottom: 10px;
  }
  .btn-tool {
    padding: 5px 12px; border: none; border-radius: 10px; cursor: pointer;
    font-family: var(--font-mirt); margin-right: 5px; margin-top: 5px;
  }

  /* --- 🔐 Login --- */
  .login-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3);
    display: none; align-items: center; justify-content: center; z-index: 1000;
    backdrop-filter: blur(5px);
  }
  .login-card { background: white; padding: 30px; border-radius: 25px; width: 300px; text-align: center; }

</style>
</head>
<body>

<div class="emoji-bg" id="emoji-area"></div>

<nav>
  <div class="brand">pinkjujapipi 🎀</div>
  <div class="nav-right">
    <button class="btn-nav" onclick="showPage('public')">คิวงาน</button>
    <button class="btn-nav" style="background:var(--blue-main)" onclick="openLogin()">แอดมิน</button>
  </div>
</nav>

<div class="container">
  
  <div id="page-public">
    <div class="card" style="text-align: center; background: linear-gradient(to bottom, #fff, var(--blue-soft));">
      <h2 style="color: var(--purple-deep);">ร้านจูรับทำเว็บครบวงจรนะแม่น้า ✨</h2>
      <p style="font-size: 1.1rem;">งานพรีเมียม | เว็บเติมเกม | เว็บป้าย</p>
      <div style="margin-top: 10px; font-size: 0.9rem; color: #888;">
        📍 ปกติรอ 4-8 ชม. งานเร่ง *2 นะคะคนสวย
      </div>
    </div>

    <div class="title-section">💎 งานที่กำลังเสกเปอร์เซ็นต์</div>
    <div id="list-active"></div>

    <div class="title-section" style="margin-top: 30px;">⏳ คิวรอถัดไปจ้า</div>
    <div id="list-waiting"></div>
  </div>

  <div id="page-admin" class="admin-box">
    <div class="card">
      <div class="title-section">➕ เพิ่มงานใหม่</div>
      <input type="text" id="in-name" class="input-ui" placeholder="ชื่อลูกค้า/ร้าน">
      <input type="text" id="in-service" class="input-ui" placeholder="ประเภทงาน (เช่น เว็บเติมเกม)">
      <button class="btn-add" onclick="addNew()">จองคิวลงระบบ ✨</button>
    </div>

    <div class="title-section">🔧 จัดการคิวหลังบ้าน</div>
    <div id="admin-list"></div>
    
    <button onclick="location.reload()" style="width:100%; padding:10px; border:none; background:#eee; border-radius:15px; font-family:var(--font-mirt);">🚪 ออกจากระบบ</button>
  </div>

</div>

<div class="login-overlay" id="login-modal">
  <div class="login-card">
    <h3 style="margin-bottom: 15px;">รหัสแอดมินนะแม่ 🔐</h3>
    <input type="password" id="pass-val" class="input-ui" style="text-align: center;" placeholder="ใส่รหัส 1234">
    <button class="btn-add" onclick="checkAuth()">เข้าสู่ระบบ</button>
    <p onclick="document.getElementById('login-modal').style.display='none'" style="margin-top:10px; cursor:pointer; color:#999;">ยกเลิก</p>
  </div>
</div>

<script>
  let data = JSON.parse(localStorage.getItem('jujapi_db')) || [];
  let qNumber = JSON.parse(localStorage.getItem('jujapi_q')) || 1;

  function save() {
    localStorage.setItem('jujapi_db', JSON.stringify(data));
    localStorage.setItem('jujapi_q', JSON.stringify(qNumber));
    render();
  }

  function showPage(p) {
    document.getElementById('page-public').style.display = (p === 'public') ? 'block' : 'none';
    document.getElementById('page-admin').style.display = (p === 'admin') ? 'block' : 'none';
  }

  function openLogin() { document.getElementById('login-modal').style.display = 'flex'; }
  
  function checkAuth() {
    if(document.getElementById('pass-val').value === "1234") {
      document.getElementById('login-modal').style.display = 'none';
      showPage('admin');
    } else { alert("รหัสผิดจ้าแม่!"); }
  }

  function addNew() {
    const n = document.getElementById('in-name').value;
    const s = document.getElementById('in-service').value;
    if(!n) return;
    data.push({ id: Date.now(), q: qNumber++, name: n, svc: s, status: 'wait', prog: 0 });
    document.getElementById('in-name').value = "";
    document.getElementById('in-service').value = "";
    save();
  }

  function addProg(id) {
    const item = data.find(x => x.id === id);
    if(item) {
      item.status = 'active';
      item.prog = Math.min(item.prog + 10, 100);
      save();
    }
  }

  function delItem(id) {
    if(confirm("ลบคิวนี้เลยไหมแม่?")) {
      data = data.filter(x => x.id !== id);
      save();
    }
  }

  function render() {
    const activeDiv = document.getElementById('list-active');
    const waitDiv = document.getElementById('list-waiting');
    const admDiv = document.getElementById('admin-list');
    
    activeDiv.innerHTML = ""; waitDiv.innerHTML = ""; admDiv.innerHTML = "";

    data.forEach(x => {
      const card = `
        <div class="q-card ${x.status === 'active' ? 'active' : ''}">
          <div class="q-header">
            <span class="q-name">คุณ${x.name} <small style="font-size:0.8rem; color:#888;">(${x.svc})</small></span>
            <span class="q-num">#${x.q}</span>
          </div>
          ${x.status === 'active' || x.prog > 0 ? `
            <div class="progress-wrapper">
              <span class="percent-tag">ความสวย ${x.prog}%</span>
              <div class="bar-bg"><div class="bar-fill" style="width:${x.prog}%"></div></div>
            </div>
          ` : '<p style="margin-top:10px; color:#aaa; font-size:0.9rem;">⏳ รอรับคิวเสกความสวยน้า...</p>'}
        </div>
      `;

      if(x.status === 'active' || x.prog === 100) activeDiv.innerHTML += card;
      else waitDiv.innerHTML += card;

      admDiv.innerHTML += `
        <div class="adm-item">
          <strong>#${x.q} ${x.name}</strong> - ${x.prog}%
          <div>
            <button class="btn-tool" style="background:var(--purple-deep); color:white;" onclick="addProg(${x.id})">+10% / รับงาน</button>
            <button class="btn-tool" style="background:#ff85a2; color:white;" onclick="delItem(${x.id})">ลบคิว</button>
          </div>
        </div>
      `;
    });
  }

  // --- สร้าง Emoji ลอยๆ ---
  const area = document.getElementById('emoji-area');
  const icons = ['✨', '💎', '💜', '💙', '💻', '🎀', '🪄'];
  for(let i=0; i<15; i++) {
    let e = document.createElement('div');
    e.className = 'emoji';
    e.innerText = icons[Math.floor(Math.random()*icons.length)];
    e.style.left = Math.random()*100 + 'vw';
    e.style.animationDelay = Math.random()*10 + 's';
    area.appendChild(e);
  }

  render();
</script>
</body>
</html>
