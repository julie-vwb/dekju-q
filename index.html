<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue System Full Option ✨</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --main: #b78bdb; --pink: #f472b6; }
        * { font-family: 'Segoe UI', 'Noto Sans Thai', sans-serif; border-radius: 25px !important; }
        body { background: linear-gradient(135deg, #f3e8ff 0%, #fce7f3 100%); min-height: 100vh; padding: 20px; }
        .card-cute { background: white; border: 2px solid #e9d5ff; padding: 25px; box-shadow: 0 10px 30px rgba(183,139,219,0.1); }
        .btn-grad { background: linear-gradient(135deg, var(--main), var(--pink)); color: white; font-weight: bold; border: none; cursor: pointer; padding: 14px; transition: 0.3s; }
        .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(244,114,182,0.3); }
        .btn-step { background: #fdf2f8; color: #db2777; border: 2px solid #fbcfe8; padding: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .status-waiting { background: #fee2e2; color: #dc2626; }
        .status-doing { background: #fef3c7; color: #d97706; }
        .status-done { background: #dcfce7; color: #166534; }
        .progress-bar { height: 16px; background: #f3f0ff; overflow: hidden; border: 1px solid #e9d5ff; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--main), var(--pink)); transition: width 0.5s ease; }
        .verify-box { background: #f5f3ff; border: 2px solid #ddd6fe; padding: 15px; text-align: center; margin-top: 15px; }
        .chat-box { position: fixed; bottom: 105px; right: 30px; width: 320px; height: 450px; background: white; z-index: 1000; display: flex; flex-direction: column; border: 2px solid #e9d5ff; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .copy-btn { background: #dcfce7; color: #15803d; border: 2px solid #bbf7d0; width: 100%; font-weight: bold; padding: 12px; cursor: pointer; margin: 15px 0; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const App = () => {
            const [searchId, setSearchId] = useState('');
            const [order, setOrder] = useState(null);
            const [isChatOpen, setIsChatOpen] = useState(false);
            const [isVerified, setIsVerified] = useState(false);
            const [copied, setCopied] = useState(false);
            const [db, setDb] = useState({
                "A001": { name: "นารีย์", job: "ออกแบบโลโก้", progress: 0 }
            });

            const getStatusText = (p) => {
                if (p === 0) return "รอคิวถัดไป";
                if (p < 100) return "กำลังทำ";
                return "เสร็จแล้ว";
            };

            const handleSearch = () => {
                const key = searchId.toUpperCase().trim();
                if (db[key]) {
                    setOrder({ ...db[key], id: key });
                    setIsVerified(false);
                } else {
                    alert("หารหัสนี้ไม่เจอค่ะพี่!");
                }
            };

            const updateProg = (val) => {
                const next = val === 0 ? 0 : Math.min(order.progress + val, 100);
                const updated = { ...order, progress: next };
                setOrder(updated);
                setDb({ ...db, [order.id]: updated });
                setCopied(false);
            };

            const copyStatus = () => {
                const statusTxt = getStatusText(order.progress);
                const text = `🌸 อัปเดตสถานะออเดอร์ #${order.id} 🌸\n👤 คุณ: ${order.name}\n📊 คืบหน้า: ${order.progress}%\n✨ สถานะ: ${statusTxt}\n----------------\nเช็คที่นี่: [ลิงก์เว็บของคุณ]`;
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="max-w-md mx-auto pb-20">
                    <div className="text-center py-6"><h1 className="text-3xl font-bold text-purple-600">💜 ระบบเช็คคิว Full Option</h1></div>
                    <div className="card-cute mb-6">
                        <div className="flex gap-2">
                            <input className="w-full p-4 border-2 border-purple-50 outline-none" placeholder="ใส่รหัสออเดอร์" value={searchId} onChange={e => setSearchId(e.target.value)} />
                            <button className="btn-grad px-6" onClick={handleSearch}>ค้นหา</button>
                        </div>
                    </div>
                    {order && (
                        <div className="card-cute animate-fade-in border-t-8 border-purple-400">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-2xl font-bold text-purple-900">#{order.id}</h2>
                                <span className={`px-4 py-1 text-sm font-bold ${order.progress === 0 ? 'status-waiting' : order.progress < 100 ? 'status-doing' : 'status-done'}`}>{getStatusText(order.progress)}</span>
                            </div>
                            <div className="mb-6">
                                <div className="flex justify-between text-xs font-bold mb-2"><span className="text-gray-400">ความคืบหน้า {order.progress}%</span></div>
                                <div className="progress-bar"><div className="progress-fill" style={{ width: `${order.progress}%` }}></div></div>
                            </div>
                            <div className="flex gap-2 mb-4">
                                <button className="btn-step" onClick={() => updateProg(10)}>+ 10%</button>
                                <button className="btn-step" onClick={() => updateProg(20)}>+ 20%</button>
                                <button className="btn-step bg-gray-50 text-gray-400 border-gray-200" onClick={() => updateProg(0)}>ล้าง</button>
                            </div>
                            <button className="copy-btn" onClick={copyStatus}><i className={`fa-solid ${copied ? 'fa-check' : 'fa-copy'}`}></i>{copied ? 'คัดลอกสำเร็จแล้ว!' : 'คัดลอกแคปชั่นอัปเดต'}</button>
                            {!isVerified ? (
                                <div className="verify-box">
                                    <p className="text-xs text-purple-500 mb-3 font-bold italic text-center">⚠️ ยืนยันตัวตนก่อนทักแชท</p>
                                    <button className="btn-grad w-full text-sm" onClick={() => setIsVerified(true)}>✅ ยืนยันว่าฉันคือ คุณ{order.name}</button>
                                </div>
                            ) : (
                                <div className="bg-green-50 border-2 border-green-200 p-3 text-center text-green-600 font-bold text-sm">🔓 ยืนยันตัวตนสำเร็จ! ทักแชทได้เลย</div>
                            )}
                        </div>
                    )}
                    <button className={`fixed bottom-8 right-8 w-16 h-16 shadow-2xl flex items-center justify-center text-2xl ${isVerified ? 'btn-grad' : 'bg-gray-300 text-white cursor-not-allowed'}`} onClick={() => isVerified ? setIsChatOpen(!isChatOpen) : alert("ยืนยันตัวตนก่อนนะพี่!")}>
                        {isChatOpen ? <i className="fa-solid fa-xmark"></i> : <i className="fa-solid fa-comment-dots"></i>}
                    </button>
                    {isChatOpen && (
                        <div className="chat-box overflow-hidden animate-slide-up">
                            <div className="btn-grad p-4 flex justify-between items-center"><span>💬 คุยกับแอดมิน (Verified)</span><i className="fa-solid fa-circle text-[8px] text-green-400 animate-pulse"></i></div>
                            <div className="flex-1 bg-purple-50 p-4 space-y-3">
                                <div className="bg-purple-200 p-2 text-[10px] text-purple-700 text-center font-bold">ออเดอร์ #{order.id}</div>
                                <div className="bg-white p-3 rounded-2xl rounded-tl-none text-xs text-gray-600 shadow-sm">สวัสดีค่ะ คุณ<b>{order.name}</b> แอดมินรับทราบตัวตนแล้วค่ะ ทิ้งแชทไว้ได้เลยนะคะ ✨</div>
                            </div>
                            <div className="p-3 bg-white border-t flex gap-2"><input className="flex-1 text-xs outline-none bg-gray-50 p-3 rounded-xl" placeholder="พิมพ์ข้อความ..." /><button className="text-purple-500 px-2"><i className="fa-solid fa-paper-plane"></i></button></div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
