<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Queue System — PINK JULIE ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-grad: linear-gradient(135deg, #fff0f6 0%, #e6f7ff 100%);
            --pink-accent: #ff85c0;
            --pink-soft: #ffdeeb;
            --grad-pink: linear-gradient(90deg, #ff9a9e, #fecfef, #ff9a9e);
            --radius-main: 40px;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mitr', sans-serif; }
        body { background: var(--bg-grad); background-attachment: fixed; min-height: 100vh; color: #595959; overflow-x: hidden; }

        header { padding: 40px 20px; text-align: center; }
        .profile-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; padding: 5px; background: white; box-shadow: 0 10px 25px rgba(255,133,192,0.3); border: 2px solid var(--pink-soft); overflow: hidden; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        
        .shop-name { font-size: 1.8rem; font-weight: 600; color: var(--pink-accent); }
        .nav-pill { display: inline-flex; background: #fff; padding: 6px; border-radius: 999px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-btn { padding: 12px 25px; border-radius: 999px; border: none; cursor: pointer; font-size: 0.9rem; color: #ccc; background: transparent; transition: 0.3s; }
        .nav-btn.active { background: var(--grad-pink); color: #fff; box-shadow: 0 4px 10px rgba(255,154,158,0.3); }

        .container { max-width: 500px; margin: 0 auto; padding: 20px; padding-bottom: 120px; }
        .section-title { font-size: 0.95rem; font-weight: 600; color: var(--pink-accent); margin: 30px 0 15px 10px; display: flex; align-items: center; gap: 8px; }

        /* การ์ดคิวงาน */
        .q-card { background: white; border-radius: var(--radius-main); padding: 30px; margin-bottom: 20px; position: relative; box-shadow: 0 15px 40px rgba(0,0,0,0.06); border: 1.5px solid rgba(255,255,255,0.8); transition: 0.3s; }
        .q-no { position: absolute; top: 30px; right: 30px; font-size: 0.75rem; font-weight: 600; color: white; background: var(--grad-pink); padding: 5px 15px; border-radius: 12px; }
        .progress-container { background: #f2f2f2; border-radius: 20px; height: 18px; overflow: hidden; margin: 15px 0; border: 1px solid #fff; }
        .progress-bar { height: 100%; width: 0%; background: var(--grad-pink); background-size: 200% 100%; transition: width 0.8s ease; }

        /* ระบบป๊อปอัพพรีเมียม (Custom Modal) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 10000; animation: fadeIn 0.3s; }
        .modal-content { background: white; width: 90%; max-width: 380px; padding: 40px 30px; border-radius: var(--radius-main); box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* ปุ่มและอินพุต */
        .input-premium { width: 100%; border: 2px solid #ffdeeb; padding: 15px 25px; border-radius: 25px; outline: none; font-size: 1rem; margin-bottom: 20px; transition: 0.3s; }
        .input-premium:focus { border-color: var(--pink-accent); box-shadow: 0 0 10px rgba(255,133,192,0.2); }
        .btn-finish { background: var(--grad-pink); color: white; border-radius: 25px; padding: 12px 25px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn-finish:active { transform: scale(0.95); }

        /* แชทพรีเมียม */
        #chat-box { position: fixed; bottom: 110px; right: 30px; width: 340px; height: 500px; background: white; border-radius: var(--radius-main); box-shadow: 0 25px 60px rgba(0,0,0,0.2); display: none; flex-direction: column; overflow: hidden; z-index: 9999; border: 3px solid #fff; }
        .chat-header { background: var(--grad-pink); color: white; padding: 20px; font-weight: 600; text-align: center; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #fffcfd; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.9rem; }
        .msg-admin { background: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 5px; }
        .msg-user { background: var(--pink-soft); color: var(--pink-accent); align-self: flex-end; border-bottom-right-radius: 5px; }
        
        #chat-widget { position: fixed; bottom: 30px; right: 30px; z-index: 9999; }
        #chat-btn { width: 65px; height: 65px; border-radius: 50%; background: var(--grad-pink); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 10px 25px rgba(255,133,192,0.5); }
    </style>
</head>
<body>

<header>
    <div class="profile-container">
        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Julie&backgroundColor=ffdeeb" class="profile-img">
    </div>
    <div class="shop-name">PINK — JULIE</div>
    <div class="nav-pill">
        <button class="nav-btn active" id="tab-pub" onclick="goPage('pub')">คิวงานลูกค้า</button>
        <button class="nav-btn" id="tab-adm" onclick="showLoginModal()">แอดมิน</button>
    </div>
</header>

<div class="container">
    <main id="page-pub">
        <div class="section-title">💖 กำลังตั้งใจทำอยู่นะคะ</div>
        <div id="list-doing"></div>
        <div class="section-title">⏳ คิวถัดไปเตรียมตัวเลย</div>
        <div id="list-next"></div>
        <div class="section-title">🌸 งานสวยๆ เสร็จแล้วจ้า</div>
        <div id="list-done"></div>
    </main>

    <main id="page-adm" style="display:none;">
        <div class="q-card" style="border: 2px solid var(--pink-soft);">
            <div style="font-weight:600; color:var(--pink-accent); margin-bottom:15px;">🎀 เพิ่มคิวใหม่</div>
            <input type="text" id="in-name" class="input-premium" placeholder="ชื่อลูกค้า">
            <input type="text" id="in-svc" class="input-premium" placeholder="รายละเอียดงาน">
            <button class="btn-finish" onclick="addNewOrder()">บันทึกคิว ✨</button>
        </div>
        <div id="adm-list"></div>
        <div class="q-card">
            <div style="font-weight:600; margin-bottom:10px;">💬 ตอบแชทลูกค้า</div>
            <div id="adm-chat-history" style="height:150px; overflow-y:auto; font-size:0.8rem; border:1px solid #f0f0f0; padding:10px; border-radius:20px; margin-bottom:10px;"></div>
            <div style="display:flex; gap:8px;">
                <input type="text" id="adm-reply-input" class="input-premium" style="margin-bottom:0;" placeholder="ตอบกลับ...">
                <button class="btn-finish" style="width:80px;" onclick="sendMessage('admin')">ส่ง</button>
            </div>
        </div>
    </main>
</div>

<div id="login-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom:10px; color:var(--pink-accent);">ยืนยันตัวตนแอดมิน</h3>
        <p style="font-size:0.85rem; color:#999; margin-bottom:20px;">กรุณากรอกรหัสผ่านเพื่อเข้าสู่ระบบ</p>
        <input type="password" id="admin-pass" class="input-premium" placeholder="รหัสผ่าน (1234)">
        <div style="display:flex; gap:10px;">
            <button class="btn-finish" style="background:#f0f0f0; color:#999;" onclick="closeModal('login-modal')">ยกเลิก</button>
            <button class="btn-finish" onclick="checkAdminLogin()">ตกลง ✨</button>
        </div>
    </div>
</div>

<div id="chat-widget">
    <div id="chat-box">
        <div class="chat-header">Julie Support ✨</div>
        <div id="chat-auth" style="padding:40px 20px; text-align:center;">
            <p style="font-size:0.85rem; margin-bottom:15px;">กรุณาระบุชื่อหรือเลขออเดอร์<br>เพื่อความสะดวกในการบริการค่ะ 🎀</p>
            <input type="text" id="chat-user-id" class="input-premium" placeholder="PJ-001 หรือ ชื่อของคุณ">
            <button class="btn-finish" onclick="startChat()">เริ่มแชท ✨</button>
        </div>
        <div id="chat-main" style="display:none; flex-direction:column; height:100%;">
            <div class="chat-messages" id="chat-messages"></div>
            <div style="padding:15px; display:flex; gap:8px;">
                <input type="text" id="chat-input" class="input-premium" style="margin-bottom:0;" placeholder="พิมพ์คุยกับแอดมิน...">
                <button class="btn-finish" style="width:60px;" onclick="sendMessage('user')">✈️</button>
            </div>
        </div>
    </div>
    <button id="chat-btn" onclick="toggleChat()">💬</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('pj_final_v15')) || { q: [], chats: [], nextNo: 1 };
    let authed = false;
    let currentUser = "";

    function save() { localStorage.setItem('pj_final_v15', JSON.stringify(db)); render(); }

    function render() {
        const draw = (list) => list.length === 0 ? `<div style="text-align:center; padding:20px; color:#ccc; font-size:0.8rem;">ไม่มีคิวงานจ้า ✨</div>` : list.map(x => `
            <div class="q-card">
                <div class="q-no">${x.no}</div>
                <div style="font-weight:600;">คุณ ${x.name}</div>
                <div style="font-size:0.85rem; color:#999;">${x.svc}</div>
                <div class="progress-container"><div class="progress-bar" style="width:${x.progress}%"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--pink-accent); font-weight:600;">
                    <span>${x.progress === 100 ? 'งานเสร็จแล้วค่ะ!' : 'กำลังเร่งทำให้นะคะ'}</span>
                    <span>${x.progress}%</span>
                </div>
            </div>
        `).join('');

        document.getElementById('list-doing').innerHTML = draw(db.q.filter(x => x.progress > 0 && x.progress < 100));
        document.getElementById('list-next').innerHTML = draw(db.q.filter(x => x.progress === 0));
        document.getElementById('list-done').innerHTML = draw(db.q.filter(x => x.progress === 100));

        if (authed) {
            document.getElementById('adm-list').innerHTML = db.q.map(x => `
                <div class="q-card">
                    <div class="q-no">${x.no}</div>
                    <div style="font-weight:600;">คุณ ${x.name}</div>
                    <div style="display:flex; gap:8px; margin-top:10px;">
                        <button class="btn-finish" style="padding:5px 10px; font-size:0.7rem;" onclick="updateQ(${x.id})">+10%</button>
                        <button class="btn-finish" style="padding:5px 10px; font-size:0.7rem; background:#ff4d4f;" onclick="delQ(${x.id})">ลบ</button>
                    </div>
                </div>
            `).join('');
            document.getElementById('adm-chat-history').innerHTML = db.chats.map(m => `<div>[${m.user}] ${m.text}</div>`).join('');
        }
        renderMessages();
    }

    // ระบบ Modal
    function showLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function checkAdminLogin() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === '1234') {
            authed = true;
            closeModal('login-modal');
            goPage('adm');
        } else {
            alert('รหัสผ่านไม่ถูกต้องค่ะ!');
        }
    }

    function startChat() {
        const user = document.getElementById('chat-user-id').value;
        if (!user) return alert('กรุณาระบุตัวตนก่อนแชทนะคะ');
        currentUser = user;
        document.getElementById('chat-auth').style.display = 'none';
        document.getElementById('chat-main').style.display = 'flex';
        db.chats.push({ role: 'admin', text: `สวัสดีค่ะคุณ ${user} มีอะไรให้ช่วยไหมคะ?`, user: 'Admin' });
        save();
    }

    function sendMessage(role) {
        const input = document.getElementById(role === 'user' ? 'chat-input' : 'adm-reply-input');
        if (!input.value) return;
        db.chats.push({ role, text: input.value, user: role === 'user' ? currentUser : 'Admin' });
        input.value = '';
        save();
    }

    function renderMessages() {
        const container = document.getElementById('chat-messages');
        if (container) {
            container.innerHTML = db.chats.map(m => `<div class="msg msg-${m.role}">${m.text}</div>`).join('');
            container.scrollTop = container.scrollHeight;
        }
    }

    function addNewOrder() {
        const n = document.getElementById('in-name').value;
        const s = document.getElementById('in-svc').value;
        if (n) {
            db.q.push({ id: Date.now(), no: "PJ-" + db.nextNo.toString().padStart(3, '0'), name: n, svc: s, progress: 0 });
            db.nextNo++;
            save();
            document.getElementById('in-name').value = ''; document.getElementById('in-svc').value = '';
        }
    }

    function updateQ(id) { const i = db.q.find(x => x.id === id); if (i) { i.progress = Math.min(i.progress + 10, 100); save(); } }
    function delQ(id) { if(confirm('ลบคิวนี้?')) { db.q = db.q.filter(x => x.id !== id); save(); } }
    function goPage(p) { 
        document.getElementById('page-pub').style.display = p === 'pub' ? 'block' : 'none'; 
        document.getElementById('page-adm').style.display = p === 'adm' ? 'block' : 'none'; 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id.includes(p))); 
        render();
    }
    function toggleChat() { 
        const box = document.getElementById('chat-box');
        box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
    }

    render();
</script>
</body>
</html>
