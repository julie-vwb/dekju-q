<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎀 Kawaii Order Queue ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Mitr', sans-serif !important; }
        body {
            background: linear-gradient(135deg, #ffe4f5 0%, #f3e5ff 50%, #e5f4ff 100%);
            color: #4a4a4a;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 15px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 3rem; background: linear-gradient(135deg, #ff85b3, #ffb3d9, #d8c5e8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; font-weight: 600; }
        .header p { color: #8b8b8b; letter-spacing: 2px; }
        .card { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); border-radius: 30px; padding: 30px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(255,179,217,0.25); position: relative; }
        .card h3 { color: #ff85b3; font-size: 1.3rem; margin-bottom: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; box-shadow: 0 8px 24px rgba(255,179,217,0.25); }
        .btn-danger { background: linear-gradient(135deg, #ff8fa3, #ff6b85); color: white; }
        .btn-small { padding: 8px 14px; font-size: 0.75rem; }
        .toggle-btn { padding: 12px 28px; border: 2px solid #f5f5f5; border-radius: 50px; background: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .toggle-btn.active { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; border-color: #ff85b3; transform: scale(1.05); }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #f5f5f5; border-radius: 20px; background: white; font-size: 16px; }
        input:focus, textarea:focus { border-color: #ffb3d9; background: #ffe4f5; outline: none; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #ff85b3; }
        .input-group { margin-bottom: 18px; }
        .pill-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
        .pill { padding: 10px 16px; border: 2px solid #f5f5f5; border-radius: 50px; background: rgba(255,255,255,0.8); cursor: pointer; transition: all 0.3s; font-weight: 600; font-size: 0.9rem; }
        .pill.active { background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; border-color: #ff85b3; transform: scale(1.08); }
        
        /* แก้ไข Progress Bar ไม่ให้ทับปุ่ม */
        .progress-container { width: calc(100% - 140px); margin-top: 12px; }
        .progress-bar { width: 100%; height: 20px; background: rgba(255,255,255,0.6); border-radius: 50px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #ffb3d9, #d8c5e8); width: 0%; transition: width 0.8s; }
        
        .queue-card { background: rgba(255,255,255,0.85); padding: 20px; border-radius: 30px; border-left: 6px solid #ffb3d9; margin-bottom: 15px; position: relative; min-height: 160px; }
        .status-pill-fixed { position: absolute; bottom: 20px; right: 20px; padding: 8px 18px; border-radius: 50px; background: linear-gradient(135deg, #ffb3d9, #d8c5e8); color: white; font-weight: 600; font-size: 0.85rem; box-shadow: 0 4px 10px rgba(255,179,217,0.3); }
        
        .badge { background: linear-gradient(135deg, #ff85b3, #ffb3d9); color: white; padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 0.75rem; }
        .category-title { color: #ff85b3; margin: 30px 0 15px 10px; font-size: 1.4rem; font-weight: 600; border-bottom: 2px dashed #ffb3d9; display: inline-block; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; backdrop-filter: blur(5px); }
        .overlay.active { display: flex; }
        .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 420px; width: 90%; }
        .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: linear-gradient(135deg, #ff85b3, #ffb3d9); color: white; padding: 14px 28px; border-radius: 50px; z-index: 9999; display: none; animation: slideDown 0.3s ease; }
        .view { display: none; }
        .view.active { display: block; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 20px; text-align: center; }
        .stat-num { font-size: 2rem; font-weight: 700; color: #ffb3d9; }
        @keyframes slideDown { from { opacity: 0; transform: translate(-50%, -50px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @media (max-width: 768px) {
            .progress-container { width: 100%; margin-bottom: 50px; }
            .queue-card { min-height: auto; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <div id="clientView" class="view active">
        <div class="container">
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px;">
                <button class="toggle-btn active" onclick="showView('client')">👁️ ตรวจสอบคิว</button>
                <button class="toggle-btn" onclick="tryAdmin()">🛠️ ระบบจัดการ</button>
            </div>
            <div class="header">
                <h1>🎀 PJ Kawaii Queue ✨</h1>
                <p>Professional Service Dashboard</p>
            </div>
            <div class="card">
                <h3>🔍 ค้นหาออเดอร์</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="clientSearch" placeholder="เลขออเดอร์ / ชื่อลูกค้า">
                    <button class="btn btn-primary" onclick="clientSearch()">ค้นหา</button>
                </div>
            </div>
            <div id="searchResult"></div>
            <div id="clientQueueCategorized">
                </div>
        </div>
    </div>

    <div id="adminView" class="view">
        <div class="container">
            <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 40px;">
                <button class="toggle-btn" onclick="showView('client')">👁️ ตรวจสอบคิว</button>
                <button class="toggle-btn active" onclick="showView('admin')">🛠️ ระบบจัดการ</button>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1 style="color:#ff85b3">🛠 Admin Control</h1>
                <button class="btn btn-danger btn-small" onclick="logoutAdmin()">ออกจากระบบ</button>
            </div>
            <div class="stats">
                <div class="stat-box"><div class="stat-num" id="statTotal">0</div><div>ทั้งหมด</div></div>
                <div class="stat-box"><div class="stat-num" id="statWorking">0</div><div>กำลังทำ</div></div>
                <div class="stat-box"><div class="stat-num" id="statDone">0</div><div>เสร็จสิ้น</div></div>
            </div>
            <div class="card">
                <h3>➕ เพิ่ม/แก้ไขออเดอร์</h3>
                <div class="grid-2" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <input type="text" id="orderId" placeholder="Order ID (PJ-XXX)">
                    <input type="number" id="queueNum" placeholder="เลขคิว">
                </div><br>
                <input type="text" id="custName" placeholder="ชื่อลูกค้า" style="margin-bottom:15px;">
                <textarea id="workDetail" placeholder="รายละเอียดงาน" rows="3" style="margin-bottom:15px;"></textarea>
                
                <label>📊 ความคืบหน้า: <span id="progPercent">0%</span></label>
                <div class="pill-group" id="progPills"></div>
                <input type="hidden" id="workPercent" value="0">
                
                <label>📌 สถานะงาน</label>
                <div class="pill-group" id="statusPills"></div>
                <input type="hidden" id="workStatus" value="รอเริ่มงาน">
                
                <button class="btn btn-primary" style="width: 100%; margin-top: 20px;" onclick="saveOrder()">บันทึกข้อมูล ✨</button>
            </div>
            <div id="adminQueue"></div>
        </div>
    </div>

    <div class="overlay" id="loginModal">
        <div class="modal">
            <h2>🔒 Admin Login</h2>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน" style="margin: 20px 0; text-align:center;">
            <button class="btn btn-primary" style="width: 100%;" onclick="loginAdmin()">เข้าสู่ระบบ</button>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let counter = parseInt(localStorage.getItem('counter')) || 1;
        let isLoggedIn = false;
        let editingIdx = -1;

        function saveToStorage() { localStorage.setItem('orders', JSON.stringify(orders)); localStorage.setItem('counter', counter); }
        function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }

        function showView(view) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(view + 'View').classList.add('active');
            if(view === 'client') renderClient(); else renderAdmin();
        }

        function tryAdmin() { if(isLoggedIn) showView('admin'); else document.getElementById('loginModal').classList.add('active'); }
        function loginAdmin() { if(document.getElementById('adminPass').value === 'admin123') { isLoggedIn = true; document.getElementById('loginModal').classList.remove('active'); showView('admin'); } else showToast('❌ รหัสผ่านผิด'); }
        function logoutAdmin() { isLoggedIn = false; showView('client'); }

        function initPills() {
            const pp = document.getElementById('progPills');
            pp.innerHTML = '';
            [0, 20, 40, 60, 80, 100].forEach(v => {
                const b = document.createElement('button'); b.className = 'pill'; b.textContent = v+'%';
                b.onclick = () => { document.getElementById('workPercent').value = v; document.getElementById('progPercent').textContent = v+'%'; document.querySelectorAll('#progPills .pill').forEach(p => p.classList.remove('active')); b.classList.add('active'); };
                pp.appendChild(b);
            });
            const sp = document.getElementById('statusPills');
            sp.innerHTML = '';
            ['รอเริ่มงาน', 'กำลังทำ', 'ใกล้เสร็จ', 'เสร็จแล้ว', 'ส่งงานแล้ว'].forEach(s => {
                const b = document.createElement('button'); b.className = 'pill'; b.textContent = s;
                b.onclick = () => { document.getElementById('workStatus').value = s; document.querySelectorAll('#statusPills .pill').forEach(p => p.classList.remove('active')); b.classList.add('active'); };
                sp.appendChild(b);
            });
        }

        function saveOrder() {
            const name = document.getElementById('custName').value;
            if(!name) return showToast('⚠️ กรุณาใส่ชื่อ');
            const order = {
                id: document.getElementById('orderId').value || `PJ-${String(counter++).padStart(3, '0')}`,
                queue: document.getElementById('queueNum').value || (orders.length + 1),
                name: name,
                detail: document.getElementById('workDetail').value,
                status: document.getElementById('workStatus').value,
                percent: document.getElementById('workPercent').value,
                date: new Date().toLocaleDateString('th-TH')
            };
            if(editingIdx > -1) orders[editingIdx] = order; else orders.push(order);
            editingIdx = -1; saveToStorage(); renderAdmin(); showToast('✨ บันทึกแล้ว');
            initPills(); document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        }

        function renderClient() {
            const container = document.getElementById('clientQueueCategorized');
            container.innerHTML = '';
            const categories = ['กำลังทำ', 'รอเริ่มงาน', 'เสร็จแล้ว', 'ส่งงานแล้ว'];
            
            categories.forEach(cat => {
                const filtered = orders.filter(o => cat === 'กำลังทำ' ? (o.status === 'กำลังทำ' || o.status === 'ใกล้เสร็จ') : o.status === cat);
                if(filtered.length > 0) {
                    container.innerHTML += `<div class="category-title">${cat}</div>`;
                    filtered.forEach(o => {
                        container.innerHTML += `
                            <div class="queue-card">
                                <div style="display:flex; justify-content:space-between;">
                                    <h4>${o.id}</h4><span class="badge">#${o.queue}</span>
                                </div>
                                <p style="margin:5px 0;">👤 ${o.name}</p>
                                <p style="font-size:0.9rem; color:#666;">📋 ${o.detail}</p>
                                <div class="progress-container">
                                    <div class="progress-bar"><div class="progress-fill" style="width:${o.percent}%"></div></div>
                                </div>
                                <p style="font-size:0.75rem; color:#aaa; margin-top:5px;">📅 ${o.date}</p>
                                <div class="status-pill-fixed">${o.status}</div>
                            </div>`;
                    });
                }
            });
            if(orders.length === 0) container.innerHTML = '<div class="empty-state" style="text-align:center; padding:50px; color:#aaa;">📭 ยังไม่มีข้อมูลคิว</div>';
        }

        function renderAdmin() {
            document.getElementById('statTotal').textContent = orders.length;
            document.getElementById('statWorking').textContent = orders.filter(o => o.status === 'กำลังทำ').length;
            document.getElementById('statDone').textContent = orders.filter(o => o.status === 'เสร็จแล้ว' || o.status === 'ส่งงานแล้ว').length;
            document.getElementById('adminQueue').innerHTML = orders.map((o, i) => `
                <div class="card" style="padding:15px;">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${o.id} - ${o.name}</strong>
                        <div>
                            <button class="btn btn-primary btn-small" onclick="editOrder(${i})">แก้ไข</button>
                            <button class="btn btn-danger btn-small" onclick="deleteOrder(${i})">ลบ</button>
                        </div>
                    </div>
                    <p style="font-size:0.8rem;">สถานะ: ${o.status} (${o.percent}%)</p>
                </div>`).join('');
        }

        function editOrder(i) {
            editingIdx = i; const o = orders[i];
            document.getElementById('orderId').value = o.id;
            document.getElementById('queueNum').value = o.queue;
            document.getElementById('custName').value = o.name;
            document.getElementById('workDetail').value = o.detail;
            window.scrollTo(0,0);
        }

        function deleteOrder(i) { if(confirm('ลบออเดอร์นี้?')) { orders.splice(i,1); saveToStorage(); renderAdmin(); } }

        function clientSearch() {
            const term = document.getElementById('clientSearch').value.toLowerCase();
            const found = orders.filter(o => o.id.toLowerCase().includes(term) || o.name.toLowerCase().includes(term));
            const res = document.getElementById('searchResult');
            if(found.length > 0) {
                res.innerHTML = `<h3>ผลการค้นหา</h3>` + found.map(o => `
                <div class="queue-card" style="border-left-color:#d8c5e8;">
                    <h4>${o.id}</h4><p>👤 ${o.name}</p>
                    <div class="progress-container"><div class="progress-bar"><div class="progress-fill" style="width:${o.percent}%"></div></div></div>
                    <div class="status-pill-fixed">${o.status}</div>
                </div>`).join('');
            } else showToast('🔍 ไม่พบข้อมูล');
        }

        window.onload = () => { initPills(); renderClient(); };
    </script>
</body>
</html>
