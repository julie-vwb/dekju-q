<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 PINK — JULIE Queue System 🌸</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500&family=Nunito:wght@400;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pink-main: #ff85c0;
            --white: rgba(255, 255, 255, 1);
            --shadow: 0 10px 25px rgba(255, 133, 192, 0.15);
            --gradient-btn: linear-gradient(90deg, #ff9a9e 0%, #fecfef 100%);
            --gradient-copy: linear-gradient(90deg, #a18cd1 0%, #fbc2eb 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Mitr', sans-serif; }

        body {
            background: linear-gradient(180deg, #fff0f6, #f3e8ff, #e0f2fe);
            background-attachment: fixed;
            min-height: 100vh;
            color: #5d5d5d;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* --- Global UI --- */
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 30px 0; }
        .profile-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid white; box-shadow: var(--shadow); margin-bottom: 10px; }
        header h1 { font-size: 1.5rem; color: var(--pink-main); letter-spacing: 2px; }

        /* --- Tab Switcher --- */
        .tab-switcher { background: white; padding: 5px; border-radius: 50px; display: flex; width: fit-content; margin: 20px auto; box-shadow: var(--shadow); }
        .tab-btn { padding: 8px 25px; border-radius: 50px; border: none; cursor: pointer; font-size: 0.9rem; transition: 0.3s; background: transparent; color: #aaa; }
        .tab-btn.active { background: var(--gradient-btn); color: white; box-shadow: 0 4px 10px rgba(255, 154, 158, 0.4); }

        /* --- Card & Form --- */
        .card { background: var(--white); border-radius: 30px; padding: 25px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid rgba(255, 255, 255, 0.8); }
        input, select { width: 100%; padding: 12px 20px; border-radius: 20px; border: 1px solid #ffe4f1; outline: none; margin-bottom: 12px; background: #fffbff; font-size: 0.9rem; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; color: white; background: var(--gradient-btn); display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy { background: var(--gradient-copy); margin-top: 10px; font-size: 0.8rem; padding: 8px; }

        /* --- Progress Bar --- */
        .progress-outer { background: #fdf2f8; border-radius: 20px; height: 22px; width: 100%; margin: 10px 0; overflow: hidden; border: 1px solid #fce7f3; }
        .progress-inner { height: 100%; background: var(--gradient-btn); transition: width 1s ease; }

        /* --- Login Overlay --- */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 240, 246, 0.8); backdrop-filter: blur(8px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .login-card { background: white; width: 90%; max-width: 320px; padding: 40px 30px; border-radius: 35px; text-align: center; box-shadow: 0 20px 50px rgba(255, 133, 192, 0.2); }

        .hidden { display: none !important; }
        .floating-chat { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--gradient-btn); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; box-shadow: 0 10px 20px rgba(255, 133, 192, 0.4); cursor: pointer; z-index: 999; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Julie" class="profile-img">
            <h1>PINK — JULIE</h1>
            <div class="tab-switcher">
                <button class="tab-btn active" id="tab-cust" onclick="switchTab('customer')">คิวงานลูกค้า</button>
                <button class="tab-btn" id="tab-adm" onclick="triggerAdminLogin()">แอดมิน</button>
            </div>
        </header>

        <div id="view-customer">
            <div class="card">
                <input type="text" id="search-input" placeholder="พิมพ์ชื่อหรือรหัสออเดอร์..." onkeyup="searchFilter()">
                <div id="customer-list"></div>
            </div>
        </div>

        <div id="view-admin" class="hidden">
            <div class="card">
                <h3>🎀 เพิ่มคิวงานพร้อมส่ง</h3>
                <input type="text" id="adm-name" placeholder="ชื่อลูกค้า">
                <input type="text" id="adm-product" placeholder="ชื่อสินค้า">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="adm-color" placeholder="สี">
                    <input type="text" id="adm-size" placeholder="ไซส์">
                </div>
                <input type="number" id="adm-price" placeholder="ราคา (บาท)">
                <select id="adm-status">
                    <option value="รอเริ่มงาน">รอเริ่มงาน</option>
                    <option value="กำลังทำ">กำลังทำ</option>
                    <option value="เสร็จแล้ว">เสร็จแล้ว</option>
                </select>
                <button class="btn" onclick="saveOrder()">บันทึกคิวงาน 💗</button>
            </div>
            <div id="admin-list-display"></div>
        </div>
    </div>

    <div id="login-overlay">
        <div class="login-card">
            <h3 style="margin-bottom:20px; color: var(--pink-main);">🔒 แอดมินล็อกอิน</h3>
            <input type="password" id="admin-password" placeholder="ใส่รหัสผ่าน">
            <button class="btn" onclick="checkLogin()">เข้าสู่ระบบ 💗</button>
            <p onclick="closeLogin()" style="margin-top:15px; font-size:0.8rem; color:#ccc; cursor:pointer;">ยกเลิก</p>
        </div>
    </div>

    <div class="floating-chat" onclick="alert('แอดมินกำลังรีบตอบแชทนะคะ ✨')">
        <i class="fas fa-comment-dots"></i>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('pj_queues')) || [];
        let isLoggedIn = false;

        function triggerAdminLogin() {
            if (isLoggedIn) { showAdminView(); } 
            else { document.getElementById('login-overlay').style.display = 'flex'; }
        }

        function closeLogin() { document.getElementById('login-overlay').style.display = 'none'; switchTab('customer'); }

        function checkLogin() {
            if (document.getElementById('admin-password').value === 'admin123') {
                isLoggedIn = true;
                document.getElementById('login-overlay').style.display = 'none';
                showAdminView();
            } else { alert('รหัสผิดน้า 🥺'); }
        }

        function switchTab(mode) {
            if (mode === 'customer') {
                document.getElementById('tab-cust').classList.add('active');
                document.getElementById('tab-adm').classList.remove('active');
                document.getElementById('view-customer').classList.remove('hidden');
                document.getElementById('view-admin').classList.add('hidden');
            }
        }

        function showAdminView() {
            document.getElementById('tab-adm').classList.add('active');
            document.getElementById('tab-cust').classList.remove('active');
            document.getElementById('view-admin').classList.remove('hidden');
            document.getElementById('view-customer').classList.add('hidden');
            renderAdmin();
        }

        function saveOrder() {
            const newOrder = {
                id: "PJ-" + Math.floor(1000 + Math.random() * 9000),
                name: document.getElementById('adm-name').value,
                product: document.getElementById('adm-product').value,
                color: document.getElementById('adm-color').value,
                size: document.getElementById('adm-size').value,
                price: document.getElementById('adm-price').value,
                status: document.getElementById('adm-status').value,
                pct: document.getElementById('adm-status').value === 'เสร็จแล้ว' ? 100 : 30
            };
            orders.push(newOrder);
            localStorage.setItem('pj_queues', JSON.stringify(orders));
            renderAdmin();
            alert('ลงคิวสำเร็จ! อย่าลืมกดคัดลอกข้อความส่งให้ลูกค้านะคะ ✨');
        }

        // --- ระบบคัดลอกข้อความ ---
        function copyToClip(index) {
            const o = orders[index];
            const text = `#พร้อมส่ง ✨\nสินค้า: ${o.product}\nสี: ${o.color}\nไซส์: ${o.size}\nราคา: ${o.price} บาท\n\nรับออเดอร์เรียบร้อยนะคะคุณ ${o.name} 🎀\nเลขออเดอร์ของคุณคือ 【 ${o.id} 】 นะคะ\nขอบคุณที่ไว้วางใจให้ PINK — JULIE ดูแลนะคะ รองานสวยๆ ได้เลย แอดมินจะรีบปั่นให้สุดฝีมือ ใจละลายแน่นอนค่ะ! 🔥`;
            
            navigator.clipboard.writeText(text).then(() => {
                alert('คัดลอกข้อความลงคิวเรียบร้อย! ส่งต่อได้เลยค่ะ 📋💗');
            });
        }

        function renderAdmin() {
            const list = document.getElementById('admin-list-display');
            list.innerHTML = "";
            orders.forEach((o, i) => {
                list.innerHTML += `
                    <div class="card">
                        <b>${o.id} | คุณ ${o.name}</b>
                        <p style="font-size:0.8rem; color:#888;">${o.product} (${o.size}/${o.color})</p>
                        <button class="btn btn-copy" onclick="copyToClip(${i})">
                            <i class="far fa-copy"></i> คัดลอกข้อความลงคิว
                        </button>
                    </div>`;
            });
        }

        function renderCustomer(filter = "") {
            const list = document.getElementById('customer-list');
            list.innerHTML = "";
            const filtered = orders.filter(o => o.id.includes(filter) || o.name.includes(filter));
            filtered.forEach(o => {
                list.innerHTML += `
                    <div class="card">
                        <div style="display:flex; justify-content:space-between;">
                            <span style="color:var(--pink-main); font-weight:bold;">Order ${o.id}</span>
                            <span style="font-size:0.7rem;">คุณ ${o.name}</span>
                        </div>
                        <div class="progress-outer"><div class="progress-inner" style="width:${o.pct}%"></div></div>
                        <p style="font-size:0.8rem; text-align:right;">สถานะ: ${o.status}</p>
                    </div>`;
            });
        }

        function searchFilter() { renderCustomer(document.getElementById('search-input').value); }
        renderCustomer();
    </script>
</body>
</html>
